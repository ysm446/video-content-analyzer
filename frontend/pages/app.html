<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Content Analyzer</title>
  <link rel="stylesheet" href="../css/common.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    svg.lucide{width:14px;height:14px;stroke-width:1.75;vertical-align:-2px;flex-shrink:0}
    .time-label svg.lucide{vertical-align:0}
    .sidebar svg.lucide{width:20px;height:20px;stroke-width:1.5}
    .no-video svg.lucide{width:48px;height:48px;stroke-width:1}
    .ctrl-btn svg.lucide{width:15px;height:15px}
    html,body{height:100%}
    body{display:flex;flex-direction:column;overflow:hidden}
    .sidebar{height:42px;width:100%;display:flex;flex-direction:row;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 6px;gap:3px;align-items:center;position:relative}
    .sidebar-left,.sidebar-right{display:flex;align-items:center;gap:3px;position:relative;z-index:1}
    .sidebar-right{margin-left:auto}
    .sidebar-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:6px;min-width:0;max-width:min(46vw,540px)}
    .tab-btn{background:none;border:none;color:var(--text-dim);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;border-radius:8px;transition:background .15s,color .15s}
    .tab-btn:hover{background:none;color:var(--text)}
    .tab-btn.active{color:var(--accent);background:none}
    .topbar-divider{width:1px;height:20px;background:var(--border);margin:0 3px}
    .model-pill{min-width:min(32vw,360px);max-width:min(42vw,500px);height:32px;display:flex;align-items:center;gap:10px;padding:0 14px;border:none;border-radius:10px;background:linear-gradient(135deg,#5b9ee8 0%,#79b3ee 100%);color:#fff;cursor:pointer;box-shadow:none;transition:filter .15s,transform .1s,background .15s,color .15s}
    .model-pill:hover{filter:brightness(1.02);box-shadow:none}
    .model-pill:active{transform:scale(.99)}
    .model-pill:focus-visible{outline:2px solid #9ba4ff;outline-offset:2px}
    .model-pill.off{background:linear-gradient(135deg,#2b2f38 0%,#232830 100%);color:#bfc7d6;box-shadow:none}
    .model-pill.off:hover{filter:none;box-shadow:0 0 0 1px rgba(255,255,255,.04) inset}
    .model-pill.loading{background:linear-gradient(135deg,#5e9ce0 0%,#77afe8 100%)}
    .model-pill-icon{display:inline-flex;align-items:center;justify-content:center;opacity:.92}
    .model-pill-icon svg.lucide{width:15px;height:15px;stroke-width:1.8}
    .model-pill-text{min-width:0;flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
    .model-pill-caret{display:inline-flex;align-items:center;justify-content:center;opacity:.92}
    .model-pill-caret svg.lucide{width:16px;height:16px;stroke-width:1.8}
    .model-eject-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s,color .15s,transform .1s}
    .model-eject-btn:hover:not(:disabled){background:#343434;border-color:#454545;color:#fff}
    .model-eject-btn:active:not(:disabled){transform:scale(.98)}
    .model-eject-btn:disabled{opacity:.45;cursor:default}
    .model-eject-btn svg.lucide{width:17px;height:17px;stroke-width:1.9}
    .tab-panels{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .tab-panel{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
    .status-bar{height:28px;display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;font-size:12px;color:var(--text-dim)}
    .status-bar-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
    .status-bar-dot.running{background:var(--accent);animation:blink 1.2s ease-in-out infinite}
    .status-bar-dot.done{background:var(--success)}
    .status-bar-dot.error{background:var(--error)}
    .status-bar-label{color:var(--text);white-space:nowrap}
    .status-bar-text{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .player-shell{flex:1;display:grid;grid-template-columns:minmax(0,2fr) 1px minmax(0,1fr) minmax(0,1fr);grid-template-areas:"player divider analysis qa";min-height:0;overflow:hidden}
    .player-left{min-width:0;display:flex;flex-direction:column;grid-area:player}
    .panel-resizer{position:relative;background:var(--border);border-bottom:1px solid var(--border);cursor:col-resize;user-select:none;grid-area:divider}
    .panel-resizer::before{content:'';position:absolute;top:0;bottom:0;left:-5px;right:-5px}
    .panel-resizer:hover{background:var(--accent)}
    .player-top{display:flex;align-items:center;gap:8px;padding:10px 12px;min-height:56px;box-sizing:border-box;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
    .video-name{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:220px}
    .player-top-btn{padding:5px 12px;font-size:12px;letter-spacing:0}
    .player-top-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
    .player-top-action-btn{padding:5px 12px;font-size:12px;letter-spacing:0}
    .player-top-action-btn.running{background:rgba(74,158,255,.14);border-color:rgba(74,158,255,.28);color:#dcecff}

    .player-layout{flex:0 0 clamp(320px,70vh,640px);display:flex;flex-direction:column;min-height:0;background:#000}
    .vertical-resizer{position:relative;height:1px;background:var(--border);cursor:row-resize;user-select:none}
    .vertical-resizer::before{content:'';position:absolute;left:0;right:0;top:-5px;bottom:-5px}
    .vertical-resizer:hover{background:var(--accent)}
    .player-detail-pane{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;background:var(--surface)}
    .detail-scroll{flex:1;min-height:0;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:12px}
    .detail-actions{display:flex;flex-direction:column;gap:8px}
    .detail-action-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start}
    .detail-action-row.primary{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start}
    .detail-action-btn{justify-content:center;padding:7px 10px;font-size:12px;min-height:34px;min-width:0}
    .detail-action-row .detail-action-btn{flex:0 0 auto;padding-inline:12px}
    .detail-action-btn.running{background:rgba(74,158,255,.14);border-color:rgba(74,158,255,.28);color:#dcecff}
    .detail-save-btn{background:rgba(255,152,0,.16);border:1px solid rgba(255,152,0,.28);color:#ffb74d}
    .detail-save-btn:hover:not(:disabled){background:rgba(255,152,0,.24);border-color:rgba(255,152,0,.4);color:#ffd08a}
    .detail-empty{min-height:120px;flex:none;border:1px dashed var(--border);border-radius:8px;background:rgba(255,255,255,.02);color:var(--text-dim);font-size:13px;text-align:center;display:flex;align-items:center;justify-content:center;padding:18px}
    .video-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;overflow:hidden}
    #video{width:100%;height:100%;display:block;cursor:pointer;object-fit:contain}
    .no-video{display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;color:var(--text-dim)}
    .subtitle-area{background:#111;border-top:1px solid var(--border);padding:12px 20px;--subtitle-font:'Noto Sans JP','Noto Sans','Yu Gothic UI','Hiragino Sans','Segoe UI',sans-serif}
    .subtitle-overlay-host{position:absolute;left:0;right:0;bottom:42px;pointer-events:none;z-index:3}
    .subtitle-area.overlay{padding:0 22px;background:transparent;border-top:none;pointer-events:none}
    .subtitle-area.overlay #subtitleOrig,
    .subtitle-area.overlay #subtitleJp{max-width:min(92%,920px);margin:0 auto;padding:4px 14px;background:transparent;border-radius:0;text-shadow:0 1px 2px rgba(0,0,0,.95),0 3px 10px rgba(0,0,0,.72)}
    .subtitle-area.overlay #subtitleOrig{color:#e2e2e2}
    .subtitle-area.overlay #subtitleJp{margin-top:8px}
    #subtitleOrig{font-size:17px;color:#d0d0d0;min-height:24px;font-family:var(--subtitle-font);text-align:center}
    #subtitleJp{font-size:19px;color:#fff;min-height:26px;font-family:var(--subtitle-font);text-align:center}
    #subtitleOrig .sub-word{display:inline-block;border-radius:3px;padding:0 1px;transition:color .12s,background .12s}
    #subtitleOrig .sub-word-active{color:#fff;background:rgba(70,70,70,.62)}
    #dictTooltip{position:fixed;display:none;background:#1f2530;border:1px solid #4a5568;border-radius:8px;padding:10px 12px;max-width:320px;font-size:13px;line-height:1.6;color:#dbe6ff;box-shadow:0 6px 24px rgba(0,0,0,.65);z-index:9999;pointer-events:none;white-space:pre-wrap}
    #dictTooltip .dict-word{font-size:14px;font-weight:700;color:#ffd86b;margin-bottom:4px}
    #dictTooltip .dict-body{color:#dbe6ff}
    #dictTooltip .dict-loading{color:#9aa4b2;font-style:italic}

    .controls{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .controls input[type='range']{-webkit-appearance:none;appearance:none;height:20px;border-radius:99px;background:transparent;outline:none;cursor:pointer;accent-color:var(--accent)}
    .controls input[type='range']::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;margin-top:-3.5px}
    .controls input[type='range']::-webkit-slider-runnable-track{height:5px;border-radius:99px;background:var(--surface2)}
    .time-label{font-size:12px;color:var(--text-dim);display:inline-flex;align-items:center}
    .ctrl-btn{
      width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--border);
      border-radius:999px;
      background:var(--surface2);
      color:var(--text);
      cursor:pointer;
      font-size:14px;
      line-height:1;
      transition:background .15s,border-color .15s,color .15s,transform .1s;
    }
    .ctrl-btn:hover{background:#343434;border-color:#454545}
    .ctrl-btn:active{transform:scale(.97)}
    .ctrl-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    .sub-toggle{width:auto;padding:0 9px;font-size:11px;font-weight:600;letter-spacing:.02em;gap:3px;opacity:1;transition:background .15s,border-color .15s,color .15s,opacity .15s,transform .1s}
    .sub-toggle.sub-off{opacity:.35;text-decoration:line-through}

    .result-row{display:none;gap:6px;font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .result-row.done{color:var(--success)} .result-row.error{color:var(--error)}
    .elapsed-time{font-size:10px;color:var(--text-dim);font-variant-numeric:tabular-nums}
    .status-log{display:flex;flex-direction:column;gap:1px;margin-top:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .status-item{display:grid;grid-template-columns:8px 68px 1fr;gap:6px;align-items:center;padding:5px 8px;background:var(--surface2)}
    .status-item+.status-item{border-top:1px solid var(--border)}
    .status-dot-sm{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s;flex-shrink:0}
    .status-dot-sm.running{background:var(--accent);animation:blink 1.2s ease-in-out infinite}
    .status-dot-sm.done{background:var(--success)}
    .status-dot-sm.error{background:var(--error)}
    .status-name-sm{font-size:11px;color:var(--text-dim);white-space:nowrap}
    .status-body{min-width:0}
    .status-item .progress-wrap{margin-top:0}
    .status-item .progress-bar-bg{height:3px}
    .status-item .progress-label{margin-top:2px;font-size:11px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* モデル管理モーダル */
    .model-modal{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center}
    .model-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.55)}
    .model-modal-panel{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:10px;width:480px;max-height:78vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
    .model-modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;flex-shrink:0}
    .model-modal-body{overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:14px}
    .modal-section-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
    .modal-model-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent}
    .modal-model-item:hover{background:var(--surface2)}
    .modal-model-item.selected{background:rgba(74,158,255,.08);border-color:rgba(74,158,255,.3)}
    .modal-model-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .modal-model-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
    .modal-loaded-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:rgba(72,199,142,.15);color:var(--success);flex-shrink:0;margin-left:auto}
    .modal-footer-row{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--border)}
    .modal-status-text{font-size:12px;color:var(--text-dim);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .analysis-column{min-width:0;display:flex;flex-direction:column;background:var(--surface);grid-area:analysis;overflow:hidden}
    .analysis-pane{flex:1;min-height:0;display:flex;flex-direction:column;height:100%}
    .analysis-header{padding:12px 14px;min-height:56px;box-sizing:border-box;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
    .analysis-header-actions{display:flex;align-items:center;gap:8px}
    .analysis-save-btn{padding:5px 12px;font-size:12px;letter-spacing:0;text-transform:none}
    .analysis-run-btn{padding:5px 12px;font-size:12px;letter-spacing:0;text-transform:none}
    .analysis-scroll{flex:1;min-height:0;overflow-y:auto;padding:12px}
    .qa-panel{min-width:0;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);grid-area:qa;overflow:hidden}
    .qa-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;min-height:56px;box-sizing:border-box;border-bottom:1px solid var(--border)}
    .qa-title{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
    .qa-history{flex:1;overflow-y:auto;padding:10px 10px 16px;display:flex;flex-direction:column;gap:10px}
    .qa-pair{display:flex;flex-direction:column;gap:6px}
    .qa-placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:13px;text-align:center}
    .qa-question{align-self:flex-end;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:12px 12px 4px 12px;max-width:92%;white-space:pre-wrap}
    .qa-answer{align-self:flex-start;background:transparent;border:none;padding:0;max-width:96%;white-space:pre-wrap;line-height:1.7;color:var(--text)}
    .qa-answer-meta{align-self:flex-start;display:flex;flex-wrap:wrap;gap:8px 12px;max-width:96%;color:var(--text-dim)}
    .qa-meta-item{display:inline-flex;align-items:center;gap:6px;font-size:12px;line-height:1.2;color:var(--text-dim);background:none;border:none;padding:0}
    .qa-meta-item svg.lucide{width:13px;height:13px;stroke-width:1.9}
    .qa-answering{font-size:12px;color:var(--text-dim)}
    .qa-elapsed{font-size:11px;color:var(--text-dim);margin-top:3px;font-variant-numeric:tabular-nums}
    .qa-input-row{padding:12px 10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}
    .qa-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--radius)}

    .settings-main{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px;max-width:920px;margin:0 auto;width:100%}
    .section-label{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
    .model-columns{display:flex;gap:14px}.model-column{flex:1;min-width:0}
    .model-group-label{font-size:11px;color:var(--text-dim);margin:0 0 4px}
    .model-option{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);cursor:pointer}
    .model-option:hover{background:var(--surface2)}
    .model-meta{font-size:12px;color:var(--text-dim)}
    .model-apply-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim)} .status-dot.loaded{background:var(--success)}
    .frame-setting{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .frame-slider{-webkit-appearance:none;appearance:none;width:220px;min-width:120px;height:20px;border-radius:99px;background:transparent;outline:none;cursor:pointer;accent-color:var(--accent)}
    .frame-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;margin-top:-3.5px}
    .frame-slider::-webkit-slider-runnable-track{height:5px;border-radius:99px;background:var(--surface2)}
    .frame-hint{font-size:12px;color:var(--text-dim);margin-top:6px}
    .analysis-detail{margin:0;border:none;background:transparent;border-radius:0;padding:0}
    .analysis-section{padding:8px 0}
    .analysis-section+.analysis-section{border-top:1px solid var(--border)}
    .analysis-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0;background:none;border:none;color:var(--text);cursor:pointer;text-align:left}
    .analysis-toggle:hover{color:#fff}
    .analysis-toggle-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
    .analysis-toggle-icon{display:inline-flex;align-items:center;justify-content:center;color:var(--text-dim);transition:transform .15s ease}
    .analysis-toggle[aria-expanded="false"] .analysis-toggle-icon{transform:rotate(-90deg)}
    .analysis-section-body{margin-top:8px}
    .genre-tag{display:inline-block;padding:2px 10px;border-radius:7px;background:rgba(74,158,255,0.10);color:var(--accent);font-size:12px;margin-bottom:8px}
    .summary-text{font-size:13px;line-height:1.65}
    .scenes-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
    .scene-item{display:flex;gap:8px;padding:8px 10px;background:#212121;border-radius:6px;align-items:stretch}
    .scene-actions{position:relative;display:flex;align-items:flex-start;margin-left:auto}
    .scene-menu-btn{width:28px;height:28px;border:none;background:none;color:var(--text-dim);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .scene-menu-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
    .scene-menu-btn svg.lucide{width:16px;height:16px;stroke-width:1.8}
    .scene-menu{position:absolute;top:32px;right:0;min-width:108px;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.34);display:flex;flex-direction:column;gap:4px;z-index:8}
    .scene-menu-item{width:100%;padding:7px 10px;border:none;background:none;border-radius:6px;color:var(--text);text-align:left;cursor:pointer;font-size:12px}
    .scene-menu-item:hover{background:var(--surface2)}
    .scene-edit{display:flex;flex-direction:column;gap:8px;width:100%}
    .scene-edit-grid{display:grid;grid-template-columns:92px minmax(0,1fr);gap:8px}
    .scene-edit input,.scene-edit textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px}
    .scene-edit textarea{min-height:72px;resize:vertical}
    .scene-edit-actions{display:flex;gap:6px;justify-content:flex-end}
    .scene-thumb-wrap{width:112px;min-height:84px;border-radius:4px;flex-shrink:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .scene-thumb{width:100%;height:100%;border-radius:4px;display:block;object-fit:contain}
    .scene-info{display:flex;flex-direction:column;gap:3px;min-width:0}
    .scene-item[data-start]{cursor:pointer}
    .scene-item[data-start]:hover{filter:brightness(1.08)}
    .scene-time{font-size:11px;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}
    .scene-text{font-size:12px;line-height:1.5}
    .toc-row{display:grid;grid-template-columns:86px minmax(0,1fr) 64px;gap:8px;align-items:start;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px}

  <script>
    const API = 'http://127.0.0.1:8765'
    const MIN_INTERVAL = 5.0
    const state = { videoPath:null, origSrtPath:null, jpSrtPath:null, origTranscript:'', analysisReady:false, tocPath:null, tocData:null, tocDirty:false, showAnalysisPanel:true, showQaPanel:true, openSceneMenuId:null, editingSceneId:null, analysisExpanded:{actions:true,summary:true,tags:true,scenes:true} }

    function switchTab(name){
      document.querySelectorAll('.tab-panel').forEach(p=>p.style.display = p.id===`tab-${name}` ? '' : 'none')
      document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.classList.toggle('active', b.dataset.tab===name))
    }
    document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)))

    function updateProcessButtons(runningKind=null){
      const transcribeBtn=document.getElementById('transcribeBtn')
      const translateBtn=document.getElementById('translateBtn')
      if(!transcribeBtn || !translateBtn) return

      const transcribeReady=!!state.origSrtPath
      const translateReady=!!state.jpSrtPath

      transcribeBtn.classList.toggle('ready', transcribeReady && runningKind!=='transcribe')
      transcribeBtn.classList.toggle('running', runningKind==='transcribe')
      translateBtn.classList.toggle('ready', translateReady && runningKind!=='translate')
      translateBtn.classList.toggle('running', runningKind==='translate')

      transcribeBtn.innerHTML = transcribeReady && runningKind!=='transcribe'
        ? '<i data-lucide="check"></i> 文字起こし済み'
        : runningKind==='transcribe'
          ? '<i data-lucide="loader-circle"></i> 文字起こし中'
          : '<i data-lucide="mic"></i> 文字起こし'

      translateBtn.innerHTML = translateReady && runningKind!=='translate'
        ? '<i data-lucide="check"></i> 字幕生成済み'
        : runningKind==='translate'
          ? '<i data-lucide="loader-circle"></i> 字幕生成中'
          : '<i data-lucide="languages"></i> 字幕生成'

      transcribeBtn.title = transcribeReady ? '文字起こし済みです。再実行もできます' : '動画を文字起こしします'
      translateBtn.title = translateReady ? '字幕生成済みです。再実行もできます' : '日本語字幕を生成します'
      lucide.createIcons({nodes:[transcribeBtn, translateBtn]})
    }


    function setCurrentVideo(path){
      state.videoPath = path
      const name = path ? (path.split(/[\\/]/).pop() || '').replace(/\.[^.]+$/, '') : '動画未選択'
      document.getElementById('currentVideoName').textContent = name
      document.getElementById('settingsVideoPath').textContent = path || '動画未選択（プレイヤータブで読み込み）'
      document.getElementById('transcribeBtn').disabled = !path
      document.getElementById('analyzeBtn').disabled = !path
      if(path){
        state.origSrtPath = null
        state.jpSrtPath = null
        state.origTranscript = ''
        state.tocPath = null
        state.tocData = null
        state.tocDirty = false
        resetSection('transcribe')
        resetSection('translate')
        document.getElementById('translateBtn').disabled = true
        clearAnalysisDetail()
      }
      updateProcessButtons()
      setQAEnabled(!!path)
    }

    function resetSection(kind){
      const dot=document.getElementById(`${kind}Dot`)
      if(dot) dot.className='status-dot-sm'
      const progress=document.getElementById(`${kind}Progress`)
      const fill=document.getElementById(`${kind}Fill`)
      const result=document.getElementById(`${kind}Result`)
      if(progress) progress.style.display='none'
      if(fill) fill.style.width='0%'
      if(result) result.innerHTML=''
      stopTaskTimer(kind)
    }
    function updateGlobalStatus(kind,stateName,text){
      const labelMap={transcribe:'文字起こし',translate:'字幕生成',analyze:'動画分析',toc:'チャプター',qa:'チャット',app:'ステータス'}
      const dot=document.getElementById('globalStatusDot')
      const label=document.getElementById('globalStatusLabel')
      const body=document.getElementById('globalStatusText')
      dot.className='status-bar-dot'+(stateName?` ${stateName}`:'')
      label.textContent=labelMap[kind]||'ステータス'
      body.textContent=text||'待機中'
    }
    const _taskTimers = {}

    function _elapsedText(kind){
      const entry=_taskTimers[kind]
      if(!entry || !entry.startedAt) return ''
      const sec=Math.max(0, Math.floor((Date.now()-entry.startedAt)/1000))
      return ` / 経過: ${sec}秒`
    }

    function startTaskTimer(kind){
      stopTaskTimer(kind)
      _taskTimers[kind]={startedAt:Date.now(), interval:setInterval(()=>{
        const entry=_taskTimers[kind]
        if(!entry || !entry.lastLabel) return
        const pct = typeof entry.lastPct === 'number' ? ` (${Math.max(0, Math.round(entry.lastPct))}%)` : ''
        updateGlobalStatus(kind,'running',`${entry.lastLabel}${pct}${_elapsedText(kind)}`)
      },1000)}
    }

    function stopTaskTimer(kind, stateName='done', text=''){
      const entry=_taskTimers[kind]
      if(!entry) return
      if(entry.interval) clearInterval(entry.interval)
      const sec=Math.max(0, Math.floor((Date.now()-entry.startedAt)/1000))
      delete _taskTimers[kind]
      if(text){
        const suffix = stateName==='error' ? ` / 経過: ${sec}秒` : ` / 完了: ${sec}秒`
        updateGlobalStatus(kind,stateName,`${text}${suffix}`)
      }
    }

    function setProgress(kind,pct,label){
      const dot=document.getElementById(`${kind}Dot`)
      if(dot) dot.className='status-dot-sm running'
      const progress=document.getElementById(`${kind}Progress`)
      const result=document.getElementById(`${kind}Result`)
      const fill=document.getElementById(`${kind}Fill`)
      const labelEl=document.getElementById(`${kind}Label`)
      if(progress) progress.style.display='block'
      if(result) result.innerHTML=''
      if(fill) fill.style.width=pct+'%'
      if(labelEl) labelEl.textContent=label
      if(!_taskTimers[kind]) startTaskTimer(kind)
      _taskTimers[kind].lastLabel=label
      _taskTimers[kind].lastPct=pct
      const statusText=typeof pct === 'number' ? `${label} (${Math.max(0, Math.round(pct))}%)${_elapsedText(kind)}` : `${label}${_elapsedText(kind)}`
      updateGlobalStatus(kind,'running',statusText)
    }
    function setResult(kind,ok,text){
      const dot=document.getElementById(`${kind}Dot`)
      if(dot) dot.className='status-dot-sm '+(ok?'done':'error')
      const prog=document.getElementById(`${kind}Progress`)
      if(prog) prog.style.display='none'
      const el=document.getElementById(`${kind}Result`)
      if(el){
        el.className='result-row '+(ok?'done':'error')
        el.innerHTML = ok ? `<span>✓</span><span>${text}</span>` : `<span>✗</span><span>${text}</span>`
      }
      const hadTimer=!!_taskTimers[kind]
      stopTaskTimer(kind, ok?'done':'error', text)
      if(!hadTimer) updateGlobalStatus(kind, ok?'done':'error', text)
    }
    function setQAEnabled(enabled){
      state.analysisReady = enabled
      const input=document.getElementById('qaInput')
      const btn=document.getElementById('qaBtn')
      const ph=document.getElementById('qaPlaceholder')
      input.disabled=!enabled
      btn.disabled=!enabled
      if(ph) ph.style.display = enabled ? 'none' : 'flex'
    }

    function trimLeadingChatWhitespace(text){
      return String(text || '').replace(/^(?:\s*\r?\n)+/, '').replace(/^[\t ]+/, '')
    }

    function formatQaMeta(meta){
      if(!meta || typeof meta !== 'object') return []
      const usage = meta.usage && typeof meta.usage === 'object' ? meta.usage : {}
      const parts = []
      const tokensPerSec = Number(meta.tokens_per_sec)
      const tokenCount = usage.total_tokens ?? usage.completion_tokens ?? usage.output_tokens
      const elapsedSec = Number(meta.elapsed_seconds)
      const finishReason = meta.finish_reason ? String(meta.finish_reason) : ''
      if(Number.isFinite(tokensPerSec) && tokensPerSec > 0) parts.push({kind:'speed', icon:'zap', text:`${tokensPerSec.toFixed(1)} tok/sec`})
      if(tokenCount != null && tokenCount !== '') parts.push({kind:'tokens', icon:'message-square', text:`${tokenCount} tokens`})
      if(Number.isFinite(elapsedSec) && elapsedSec > 0) parts.push({kind:'elapsed', icon:'clock-3', text:`${elapsedSec.toFixed(2)}s`})
      if(finishReason) parts.push({kind:'finish', icon:'circle-stop', text:`Finish reason: ${finishReason}`})
      return parts
    }

    function renderQaMeta(meta){
      const items = formatQaMeta(meta)
      if(!items.length) return ''
      return items.map(item=>`<span class="qa-meta-item ${escHtml(item.kind || '')}"><i data-lucide="${item.icon}"></i><span>${escHtml(item.text)}</span></span>`).join('')
    }

    async function readSSE(response,onEvent){
      const reader=response.body.getReader()
      const decoder=new TextDecoder()
      let buf=''
      while(true){
        const {done,value}=await reader.read()
        if(done) break
        buf += decoder.decode(value,{stream:true})
        const lines=buf.split('\n')
        buf=lines.pop()
        for(const line of lines){
          if(line.startsWith('data: ')){
            try{ onEvent(JSON.parse(line.slice(6))) }catch{}
          }
        }
      }
    }

    function parseTsToSec(ts){
      if(!ts) return null
      const m=String(ts).trim().match(/^(?:(\d+):)?(\d{1,2}):(\d{2})(?:\.(\d+))?$/)
      if(!m) return null
      const h=Number(m[1]||0), mm=Number(m[2]), s=Number(m[3]), ms=Number(`0.${m[4]||0}`)
      return h*3600+mm*60+s+ms
    }
    function fmtTs(sec){
      const s=Math.max(0,Math.floor(Number(sec)||0))
      const m=Math.floor(s/60), ss=String(s%60).padStart(2,'0')
      return `${m}:${ss}`
    }

    async function captureSceneThumbnails(scenes, analysisResult){
      const video = document.getElementById('video')
      if(!video.src || !video.duration) return
      const savedTime = video.currentTime
      const wasPaused = video.paused
      if(!wasPaused) video.pause()
      const canvas = document.createElement('canvas')
      const aspect = video.videoHeight > 0 ? video.videoWidth / video.videoHeight : 16/9
      canvas.width = 160; canvas.height = Math.round(160 / aspect)
      const ctx = canvas.getContext('2d')
      const enriched = []
      for(let i=0;i<scenes.length;i++){
        const s = scenes[i]
        const start = Number.isFinite(s.start_sec) ? Number(s.start_sec) : parseTsToSec(s.timestamp)
        const img = document.getElementById(`scene-thumb-${i}`)
        const scene = {id: s.id||`scene_${i}`, start_sec: start, end_sec: s.end_sec??null, label: s.label||'', description: s.description||'', source:'auto'}
        if(!Number.isFinite(start) || !img){ enriched.push(scene); continue }
        const dataUrl = await new Promise(resolve=>{
          video.addEventListener('seeked',()=>{ ctx.drawImage(video,0,0,canvas.width,canvas.height); resolve(canvas.toDataURL('image/jpeg',0.8)) },{once:true})
          video.currentTime = Math.min(start, video.duration - 0.1)
        })
        img.src = dataUrl
        scene.thumbnail = dataUrl
        enriched.push(scene)
      }
      video.currentTime = savedTime
      if(!wasPaused) video.play()
      if(analysisResult && state.tocData){
        state.tocData.scenes = enriched
        renderAnalysisDetail(analysisFromTocData(state.tocData))
        markTocDraftDirty()
      }
    }

    function analysisFromTocData(data){
      const meta=data?.meta||{}
      const toc=Array.isArray(data?.toc)?data.toc:[]
      return {
        genre: meta.genre || '目次',
        summary: meta.summary || `目次 ${toc.length} 件`,
        tags: Array.isArray(meta.tags)?meta.tags:[],
        scenes: toc.map(ch=>({
          timestamp: ch.timestamp || fmtTs(ch.start_sec||0),
          label: ch.title || '',
          description: ch.summary || '',
          start_sec: ch.start_sec,
        })),
      }
    }

    function buildTocFromAnalysis(result){
      const scenes=Array.isArray(result?.scenes)?result.scenes:[]
      const toc=scenes.map((s,idx)=>{
        const start=Number.isFinite(s.start_sec)?Number(s.start_sec):(parseTsToSec(s.timestamp)||0)
        return {
          id:`ch${String(idx+1).padStart(3,'0')}`,
          start_sec:Math.max(0,start),
          end_sec:Math.max(0,start+1),
          timestamp:s.timestamp || fmtTs(start),
          title:(s.label||`チャプター${idx+1}`).trim(),
          summary:(s.description||'').trim(),
          confidence:0.8,
        }
      }).sort((a,b)=>a.start_sec-b.start_sec)
      for(let i=0;i<toc.length;i++){
        toc[i].end_sec=i+1<toc.length?toc[i+1].start_sec:(toc[i].start_sec+1)
      }
      return {
        version:1,
        video_path:state.videoPath||'',
        created_at:new Date().toISOString(),
        model:{source:'analysis'},
        meta:{
          genre:result?.genre||'不明',
          summary:result?.summary||'',
          tags:Array.isArray(result?.tags)?result.tags:[],
        },
        toc,
        bookmarks:Array.isArray(state.tocData?.bookmarks)?state.tocData.bookmarks:[],
      }
    }

    function normalizeTocData(){
      if(!state.tocData || typeof state.tocData!=='object'){
        state.tocData={version:1,video_path:state.videoPath||'',meta:{},toc:[],bookmarks:[],scenes:[]}
      }
      if(!Array.isArray(state.tocData.toc)) state.tocData.toc=[]
      if(!Array.isArray(state.tocData.bookmarks)) state.tocData.bookmarks=[]
      if(!Array.isArray(state.tocData.scenes)) state.tocData.scenes=[]
      if(!state.tocData.meta || typeof state.tocData.meta!=='object') state.tocData.meta={}
      return state.tocData
    }

    function normalizeTocRows(rows){
      const next=(rows||[]).map((row,idx)=>{
        const start=Math.max(0, Number(row.start_sec||0))
        return {
          id: row.id || `ch${String(idx+1).padStart(3,'0')}`,
          start_sec:start,
          end_sec:start,
          timestamp: row.timestamp || fmtTs(start),
          title:(row.title||`チャプター${idx+1}`).trim(),
          summary:(row.summary||'').trim(),
          confidence: row.confidence ?? 0.8,
        }
      }).sort((a,b)=>a.start_sec-b.start_sec)
      for(let i=0;i<next.length;i++){
        next[i].id=`ch${String(i+1).padStart(3,'0')}`
        next[i].timestamp=fmtTs(next[i].start_sec)
        next[i].end_sec=i+1<next.length?next[i+1].start_sec:(next[i].start_sec+1)
      }
      return next
    }

    function parseSRT(content){
      const result=[]
      const blocks=content.trim().split(/\r?\n\r?\n/)
      for(const block of blocks){
        const lines=block.trim().split(/\r?\n/)
        if(lines.length<3) continue
        const m=lines[1].match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/)
        if(!m) continue
        const toSec=(h,min,s,ms)=> +h*3600 + +min*60 + +s + +ms/1000
        result.push({ start:toSec(m[1],m[2],m[3],m[4]), end:toSec(m[5],m[6],m[7],m[8]), text:lines.slice(2).join('\n') })
      }
      return result
    }

    function findSub(subs,t){ return subs.find(s=>t>=s.start&&t<=s.end)??null }
    function findPrevSubByTime(subs,t){
      let best=null
      for(const s of subs){
        if(s.start < t-0.001 && (!best || s.start > best.start)) best=s
      }
      return best
    }
    function findNextSubByTime(subs,t){
      let best=null
      for(const s of subs){
        if(s.start > t+0.001 && (!best || s.start < best.start)) best=s
      }
      return best
    }

        const data=await res.json()

        return data.definition
      }catch{

    function wrapWords(text, segStart, segEnd){
      const parts = String(text).split(/(\s+)/)
      const wordCount = parts.filter(p=>p.trim().length>0).length || 1
      const duration = Math.max(0, segEnd - segStart)
      const step = duration / wordCount
      let idx = 0
      return parts.map(p=>{
        if(p.trim().length===0){
          return escHtml(p).replace(/ /g,'&nbsp;').replace(/\n/g,'<br>')
        }
        const wStart = segStart + idx * step
        const wEnd = segStart + (idx + 1) * step
        idx += 1
        return `<span class="sub-word" data-start="${wStart.toFixed(3)}" data-end="${wEnd.toFixed(3)}">${escHtml(p)}</span>`
      }).join('')
    }

        subOrigEl.querySelectorAll('.sub-word').forEach(span=>{
          const active = t >= parseFloat(span.dataset.start) && t < parseFloat(span.dataset.end)
          span.classList.toggle('sub-word-active', active)

      }else{

        renderedOrigSub = null
        hideTooltip()

    async function tryAutoLoadSrt(videoFilePath){
      const stem=videoFilePath.replace(/\.[^.]+$/,'')
      const targets=[{path:stem+'.original.srt',kind:'orig'},{path:stem+'.japanese.srt',kind:'jp'}]
      for(const {path,kind} of targets){
        const result=await window.electronAPI.readFile(path)
        if(result.ok){
          if(kind==='orig'){ state.origSrtPath=path; await loadSrt(path,'orig'); document.getElementById('translateBtn').disabled=false; setResult('transcribe',true,path) }
          else { state.jpSrtPath=path; await loadSrt(path,'jp'); setResult('translate',true,path) }
        }
      }
    }

    async function tryAutoLoadCache(videoFilePath){
      // 新キャッシュ (video.cache/data.json) を優先、なければ旧 .toc.json にフォールバック
      try{
        const res=await fetch(`${API}/cache/load`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({video_path:videoFilePath})})
        if(res.ok){
          const {data}=await res.json()
          if(data.transcript) state.origTranscript=data.transcript
          const analysisResult={genre:data.meta?.genre, summary:data.meta?.summary, tags:data.meta?.tags||[], scenes:data.scenes||[]}
          renderTocDetail({...data, toc:data.toc||[], bookmarks:data.bookmarks||[]})
          renderAnalysisDetail(analysisResult)
          state.tocDirty=false
          updateTocSaveButton()
          setResult('toc',true,'キャッシュから読み込み済み')
          return
        }
      }catch{}
      // フォールバック: 旧 .toc.json
      try{
        const res=await fetch(`${API}/review/toc/load`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({video_path:videoFilePath})})
        if(!res.ok) return
        const body=await res.json()
        state.tocPath=body.toc_path
        renderTocDetail(body.data)
        renderAnalysisDetail(analysisFromTocData(body.data))
        state.tocDirty=false
        updateTocSaveButton()
        setResult('toc',true,state.tocPath)
      }catch{}
    }

      await persistTocData(state.tocData,'チャプターを保存しました')
    })

    const qaInput=document.getElementById('qaInput')
    const qaBtn=document.getElementById('qaBtn')
    const qaHistory=document.getElementById('qaHistory')

    async function submitQuestion(){
      const q=qaInput.value.trim()
      if(!q || !state.videoPath) return
      qaInput.value=''; qaBtn.disabled=true

      const pair=document.createElement('div')
      pair.className='qa-pair'
      pair.innerHTML=`<div class="qa-question">${escHtml(q)}</div>`
      const thinking=document.createElement('div')
      thinking.className='qa-answering'
      thinking.textContent='回答生成中...'
      pair.appendChild(thinking)
      const ans=document.createElement('div')
      ans.className='qa-answer'
      ans.style.display='none'
      pair.appendChild(ans)
      const ansMeta=document.createElement('div')
      ansMeta.className='qa-answer-meta'
      ansMeta.style.display='none'
      pair.appendChild(ansMeta)
      const elapsed=document.createElement('div')
      elapsed.className='qa-elapsed'
      pair.appendChild(elapsed)
      qaHistory.appendChild(pair)
      pair.scrollIntoView({behavior:'smooth'})

      const qaStart=Date.now()
      const qaTimer=setInterval(()=>{
        const s=Math.floor((Date.now()-qaStart)/1000)
        elapsed.textContent=`経過: ${s}秒`
      },1000)
      const stopQaTimer=(label)=>{
        clearInterval(qaTimer)
        const s=Math.floor((Date.now()-qaStart)/1000)
        elapsed.textContent=`${label}: ${s}秒`
      }

      try{
        const res=await fetch(`${API}/review/qa`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({video_path:state.videoPath,question:q,max_frames:parseInt(document.getElementById('maxFrames').value),min_interval:MIN_INTERVAL,transcript:state.origTranscript,frame_mode:getFrameMode()})})
        await readSSE(res,event=>{
          if(event.status==='extracting_frames'){ thinking.textContent='フレーム抽出中...'; updateGlobalStatus('qa','running','フレーム抽出中...') }
          else if(event.status==='answering'){ thinking.textContent='回答生成中...'; updateGlobalStatus('qa','running','回答生成中...') }
          else if(event.status==='answer_delta'){
            if(ans.style.display==='none'){
              ans.style.display=''
              thinking.style.display='none'
            }
            const delta = ans.textContent.length === 0
              ? trimLeadingChatWhitespace(event.delta || '')
              : (event.delta || '')
            ans.textContent += delta
            pair.scrollIntoView({behavior:'smooth'})
          }
          else if(event.status==='done'){
            if((ans.textContent || '').trim().length===0){
              ans.style.display=''
              ans.textContent=trimLeadingChatWhitespace(event.answer || '')
              thinking.style.display='none'
            }
            const metaHtml = renderQaMeta(event.meta)
            if(metaHtml){
              ansMeta.style.display=''
              ansMeta.innerHTML=metaHtml
              lucide.createIcons({nodes:[ansMeta]})
            }
            stopQaTimer('完了')
            updateGlobalStatus('qa','done','回答を生成しました')
          }
          else if(event.status==='error'){ thinking.textContent='❌ '+event.message; stopQaTimer('エラー'); updateGlobalStatus('qa','error',event.message) }
        })
      }catch(e){ thinking.textContent='❌ 接続エラー: '+e.message; stopQaTimer('エラー'); updateGlobalStatus('qa','error',`接続エラー: ${e.message}`) }

      qaBtn.disabled=false
    }

    qaBtn.addEventListener('click',submitQuestion)
    qaInput.addEventListener('keydown',e=>{ if(e.key==='Enter' && !e.isComposing) submitQuestion() })
    document.getElementById('clearHistoryBtn').addEventListener('click',()=>{
      const ph=document.getElementById('qaPlaceholder')
      qaHistory.innerHTML=''
      if(ph) qaHistory.appendChild(ph)
      ph.style.display=qaInput.disabled?'flex':'none'
    })

    const playerShell = document.querySelector('.player-shell')
    const panelResizer = document.getElementById('panelResizer')
    const playerLeft = document.querySelector('.player-left')
    const analysisColumn = document.querySelector('.analysis-column')
    const qaPanel = document.querySelector('.qa-panel')
    const verticalResizer = document.getElementById('verticalResizer')
    const playerLayoutEl = document.querySelector('.player-layout')
    const toggleAnalysisPanelBtn = document.getElementById('toggleAnalysisPanelBtn')
    const toggleQaPanelBtn = document.getElementById('toggleQaPanelBtn')
    let resizing = false
    let verticalResizing = false

    function updatePanelToggleButtons(){
      toggleAnalysisPanelBtn.classList.toggle('active', state.showAnalysisPanel)
      toggleQaPanelBtn.classList.toggle('active', state.showQaPanel)
      toggleAnalysisPanelBtn.setAttribute('aria-pressed', state.showAnalysisPanel ? 'true' : 'false')
      toggleQaPanelBtn.setAttribute('aria-pressed', state.showQaPanel ? 'true' : 'false')
      toggleAnalysisPanelBtn.title = state.showAnalysisPanel ? 'チャプターを非表示' : 'チャプターを表示'
      toggleQaPanelBtn.title = state.showQaPanel ? 'チャットを非表示' : 'チャットを表示'
    }

    function updatePanelLayout(){
      const compact = window.innerWidth <= 1100
      const showAnalysis = state.showAnalysisPanel
      const showQa = state.showQaPanel
      const leftWidth = playerShell.dataset.leftWidth || 'minmax(0,2fr)'

      analysisColumn.style.display = showAnalysis ? '' : 'none'
      qaPanel.style.display = showQa ? '' : 'none'

      if(compact){
        panelResizer.style.display = 'none'
        if(showAnalysis && showQa){
          playerShell.style.gridTemplateColumns = '1fr 1fr'
          playerShell.style.gridTemplateRows = '1fr 260px'
          playerShell.style.gridTemplateAreas = '"player player" "analysis qa"'
        }else if(showAnalysis){
          playerShell.style.gridTemplateColumns = '1fr'
          playerShell.style.gridTemplateRows = '1fr 260px'
          playerShell.style.gridTemplateAreas = '"player" "analysis"'
        }else if(showQa){
          playerShell.style.gridTemplateColumns = '1fr'
          playerShell.style.gridTemplateRows = '1fr 260px'
          playerShell.style.gridTemplateAreas = '"player" "qa"'
        }else{
          playerShell.style.gridTemplateColumns = '1fr'
          playerShell.style.gridTemplateRows = '1fr'
          playerShell.style.gridTemplateAreas = '"player"'
        }
      }else{
        playerShell.style.gridTemplateRows = ''
        if(showAnalysis && showQa){
          panelResizer.style.display = ''
          playerShell.style.gridTemplateColumns = `${leftWidth} 1px minmax(0,1fr) minmax(0,1fr)`
          playerShell.style.gridTemplateAreas = '"player divider analysis qa"'
        }else if(showAnalysis){
          panelResizer.style.display = ''
          playerShell.style.gridTemplateColumns = `${leftWidth} 1px minmax(320px,1fr)`
          playerShell.style.gridTemplateAreas = '"player divider analysis"'
        }else if(showQa){
          panelResizer.style.display = ''
          playerShell.style.gridTemplateColumns = `${leftWidth} 1px minmax(320px,1fr)`
          playerShell.style.gridTemplateAreas = '"player divider qa"'
        }else{
          panelResizer.style.display = 'none'
          playerShell.style.gridTemplateColumns = 'minmax(0,1fr)'
          playerShell.style.gridTemplateAreas = '"player"'
        }
      }

      updatePanelToggleButtons()
    }

    function setSplitByX(clientX){
      const sideCount = (state.showAnalysisPanel ? 1 : 0) + (state.showQaPanel ? 1 : 0)
      if(sideCount === 0) return
      const rect = playerShell.getBoundingClientRect()
      const divider = 1
      const minLeft = 280
      const minRight = sideCount === 2 ? 520 : 320
      let left = clientX - rect.left
      left = Math.max(minLeft, Math.min(left, rect.width - minRight - divider))
      playerShell.dataset.leftWidth = `${left}px`
      updatePanelLayout()
    }
    panelResizer.addEventListener('pointerdown', e=>{
      if(window.innerWidth <= 1100 || (!state.showAnalysisPanel && !state.showQaPanel)) return
      resizing = true
      panelResizer.setPointerCapture(e.pointerId)
      document.body.style.cursor = 'col-resize'
      document.body.style.userSelect = 'none'
    })
    panelResizer.addEventListener('pointermove', e=>{
      if(!resizing) return
      setSplitByX(e.clientX)
    })
    panelResizer.addEventListener('pointerup', ()=>{
      resizing = false
      document.body.style.cursor = ''
      document.body.style.userSelect = ''
    })
    panelResizer.addEventListener('dblclick', ()=>{
      delete playerShell.dataset.leftWidth
      updatePanelLayout()
    })

    function setVideoHeightByY(clientY){
      const rect = playerLeft.getBoundingClientRect()
      const topBarEl = document.querySelector('.player-top')
      const actionEl = document.querySelector('.action-box')
      const topBarH = topBarEl ? topBarEl.offsetHeight : 0
      const resizerH = 8
      const minVideo = 220
      const minAction = 180
      const available = rect.height - topBarH - resizerH
      let videoH = clientY - rect.top - topBarH
      videoH = Math.max(minVideo, Math.min(videoH, available - minAction))
      playerLayoutEl.style.flex = `0 0 ${Math.round(videoH)}px`
      if(actionEl) actionEl.style.flex = '1 1 auto'
    }
    verticalResizer.addEventListener('pointerdown', e=>{
      verticalResizing = true
      verticalResizer.setPointerCapture(e.pointerId)
      document.body.style.cursor = 'row-resize'
      document.body.style.userSelect = 'none'
    })
    verticalResizer.addEventListener('pointermove', e=>{
      if(!verticalResizing) return
      setVideoHeightByY(e.clientY)
    })
    verticalResizer.addEventListener('pointerup', ()=>{
      verticalResizing = false
      document.body.style.cursor = ''
      document.body.style.userSelect = ''
    })
    verticalResizer.addEventListener('dblclick', ()=>{
      playerLayoutEl.style.flex = '0 0 clamp(320px,52vh,580px)'
    })

    toggleAnalysisPanelBtn.addEventListener('click', ()=>{
      state.showAnalysisPanel = !state.showAnalysisPanel
      updatePanelLayout()
      saveUiSettings({show_analysis_panel:state.showAnalysisPanel})
    })
    toggleQaPanelBtn.addEventListener('click', ()=>{
      state.showQaPanel = !state.showQaPanel
      updatePanelLayout()
      saveUiSettings({show_qa_panel:state.showQaPanel})
    })
    window.addEventListener('resize', updatePanelLayout)

    switchTab('player')
    updateFrameHint()
    fetchReviewModelStatus()
    loadUiSettings()
    setQAEnabled(false)
    syncSubtitleToggleButtons()
    switchAnalysisPane('analysis')
    updatePanelLayout()
    lucide.createIcons()
  </script>
</body>
</html>
