<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Content Analyzer</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    html,body{height:100%}
    body{display:flex;flex-direction:column;overflow:hidden}
    .tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;gap:4px;flex-shrink:0}
    .tab-btn{background:none;border:none;color:var(--text-dim);padding:12px 16px;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-panels,.tab-panel{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

    .player-shell{flex:1;display:grid;grid-template-columns:minmax(0,2fr) 8px minmax(0,1fr) minmax(0,1fr);grid-template-areas:"player divider analysis qa";min-height:0;overflow:hidden}
    .player-left{min-width:0;display:flex;flex-direction:column;grid-area:player}
    .panel-resizer{background:var(--border);cursor:col-resize;user-select:none;grid-area:divider}
    .panel-resizer:hover{background:var(--accent)}
    .player-top{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
    .video-name{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:220px}

    .player-layout{flex:0 0 clamp(320px,70vh,640px);display:flex;flex-direction:column;min-height:0;background:#000}
    .vertical-resizer{height:8px;background:var(--border);cursor:row-resize;user-select:none}
    .vertical-resizer:hover{background:var(--accent)}
    .video-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0}
    #video{max-width:100%;max-height:100%;display:block;cursor:pointer}
    .no-video{display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;color:var(--text-dim)}
    .subtitle-area{background:#111;border-top:1px solid var(--border);padding:12px 20px}
    #subtitleOrig{font-size:17px;color:#d0d0d0;min-height:24px}
    #subtitleJp{font-size:19px;color:#fff;min-height:26px}
    #subtitleOrig .sub-word{display:inline-block;border-radius:3px;padding:0 1px;transition:color .12s,background .12s}
    #subtitleOrig .sub-word-active{color:#fff;background:rgba(255,215,0,.36)}
    #dictTooltip{position:fixed;display:none;background:#1f2530;border:1px solid #4a5568;border-radius:8px;padding:10px 12px;max-width:320px;font-size:13px;line-height:1.6;color:#dbe6ff;box-shadow:0 6px 24px rgba(0,0,0,.65);z-index:9999;pointer-events:none;white-space:pre-wrap}
    #dictTooltip .dict-word{font-size:14px;font-weight:700;color:#ffd86b;margin-bottom:4px}
    #dictTooltip .dict-body{color:#dbe6ff}
    #dictTooltip .dict-loading{color:#9aa4b2;font-style:italic}

    .controls{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .controls input[type='range']{accent-color:var(--accent)}
    .time-label{font-size:12px;color:var(--text-dim)}
    .ctrl-btn{
      width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--border);
      border-radius:999px;
      background:var(--surface2);
      color:var(--text);
      cursor:pointer;
      font-size:14px;
      line-height:1;
      transition:background .15s,border-color .15s,color .15s,transform .1s;
    }
    .ctrl-btn:hover{background:#343434;border-color:#454545}
    .ctrl-btn:active{transform:scale(.97)}
    .ctrl-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    .sub-toggle{width:auto;padding:0 9px;font-size:11px;font-weight:600;letter-spacing:.02em;gap:3px;opacity:1;transition:background .15s,border-color .15s,color .15s,opacity .15s,transform .1s}
    .sub-toggle.sub-off{opacity:.35;text-decoration:line-through}

    .action-box{flex:1;border-top:1px solid var(--border);padding:10px 12px;background:var(--surface);overflow:auto}
    .action-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .action-row .btn{justify-content:center}
    .mini{font-size:11px;color:var(--text-dim);margin-top:8px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
    .result-row{display:flex;gap:8px;margin-top:6px;font-size:12px;color:var(--text-dim)}
    .elapsed-time{font-size:11px;color:var(--text-dim);margin-top:3px;font-variant-numeric:tabular-nums}
    .result-row.done{color:var(--success)} .result-row.error{color:var(--error)}

    .analysis-column{min-width:0;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);grid-area:analysis;overflow:hidden}
    .analysis-pane{flex:1;min-height:0;display:flex;flex-direction:column}
    .analysis-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
    .analysis-scroll{flex:1;overflow-y:auto;padding:10px 12px}
    .qa-panel{min-width:0;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);grid-area:qa;overflow:hidden}
    .qa-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border)}
    .qa-title{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
    .qa-history{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .qa-placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:13px;text-align:center}
    .qa-question{align-self:flex-end;background:var(--accent);color:#fff;padding:8px 12px;border-radius:12px 12px 4px 12px;max-width:85%}
    .qa-answer{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);padding:8px 12px;border-radius:4px 12px 12px 12px;max-width:90%;white-space:pre-wrap}
    .qa-answering{font-size:12px;color:var(--text-dim)}
    .qa-elapsed{font-size:11px;color:var(--text-dim);margin-top:3px;font-variant-numeric:tabular-nums}
    .qa-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px}
    .qa-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--radius)}

    .settings-main{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px;max-width:920px;margin:0 auto;width:100%}
    .section-label{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
    .model-columns{display:flex;gap:14px}.model-column{flex:1;min-width:0}
    .model-group-label{font-size:11px;color:var(--text-dim);margin:0 0 4px}
    .model-option{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);cursor:pointer}
    .model-option:hover{background:var(--surface2)}
    .model-meta{font-size:12px;color:var(--text-dim)}
    .model-apply-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim)} .status-dot.loaded{background:var(--success)}
    .frame-setting{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .frame-slider{accent-color:var(--accent);min-width:180px}
    .frame-hint{font-size:12px;color:var(--text-dim);margin-top:6px}
    .analysis-detail{margin:0}
    .genre-tag{display:inline-block;padding:2px 10px;border-radius:99px;background:rgba(74,158,255,0.16);color:var(--accent);font-size:12px;margin-bottom:8px}
    .summary-text{font-size:13px;line-height:1.65}
    .scenes-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
    .scene-item{display:flex;gap:8px;padding:8px 10px;background:var(--surface2);border-left:2px solid var(--accent);border-radius:6px}
    .scene-item[data-start]{cursor:pointer}
    .scene-item[data-start]:hover{filter:brightness(1.08)}
    .scene-time{font-size:11px;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}
    .scene-text{font-size:12px;line-height:1.5}
    .toc-row{display:grid;grid-template-columns:86px minmax(0,1fr) 64px;gap:8px;align-items:start;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px}
    .toc-row input,.toc-row textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px}
    .toc-row textarea{min-height:56px;resize:vertical}
    .toc-del{padding:6px 8px;font-size:12px}
    .tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .tag{font-size:11px;padding:3px 8px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim)}

    @media (max-width:1100px){
      .player-shell{grid-template-columns:1fr 1fr!important;grid-template-rows:1fr 260px!important;grid-template-areas:"player player" "analysis qa"!important}
      .panel-resizer{display:none}
      .player-left{border-bottom:1px solid var(--border)}
      .analysis-column{border-left:none;border-top:1px solid var(--border);overflow:hidden}
      .qa-panel{border-top:1px solid var(--border);overflow:hidden}
      .action-row{grid-template-columns:1fr}
      .model-columns{flex-direction:column}
    }
  </style>
</head>
<body>
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="player">▶ プレイヤー</button>
    <button class="tab-btn" data-tab="settings">⚙ 設定</button>
  </nav>

  <div class="tab-panels">
    <section id="tab-player" class="tab-panel">
      <div class="player-shell">
        <div class="player-left">
          <div class="player-top">
            <button class="btn btn-ghost" id="loadVideoBtn" style="padding:6px 12px;font-size:13px">📂 動画</button>
            <button class="btn btn-ghost" id="loadOrigBtn" style="padding:6px 12px;font-size:13px">📄 原文SRT</button>
            <button class="btn btn-ghost" id="clearOrigBtn" style="padding:6px 12px;font-size:13px" disabled>✖ 原文解除</button>
            <button class="btn btn-ghost" id="loadJpBtn" style="padding:6px 12px;font-size:13px">🇯🇵 日本語SRT</button>
            <button class="btn btn-ghost" id="clearJpBtn" style="padding:6px 12px;font-size:13px" disabled>✖ 日本語解除</button>
            <div class="video-name" id="currentVideoName">動画未選択</div>
          </div>

          <div class="player-layout">
            <div class="video-wrap" id="videoWrap">
              <div class="no-video" id="noVideo">
                <div style="font-size:44px">🎬</div>
                <div>動画ファイルを読み込んでください</div>
                <button class="btn btn-primary" id="loadVideoBtn2">📂 動画を選択</button>
              </div>
              <video id="video" style="display:none"></video>
            </div>
            <div class="subtitle-area">
              <div id="subtitleOrig"></div>
              <div id="subtitleJp"></div>
            </div>
            <div class="controls">
              <button class="ctrl-btn" id="prevSubBtn" title="前の字幕へ">←</button>
              <button class="ctrl-btn" id="playBtn">▶</button>
              <button class="ctrl-btn" id="nextSubBtn" title="次の字幕へ">→</button>
              <span class="time-label" id="timeLabel">0:00 / 0:00</span>
              <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1" style="flex:1;min-width:120px">
              <label class="time-label" for="speedSelect">⏩</label>
              <select id="speedSelect" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
              </select>
              <span class="time-label">🔊</span>
              <input type="range" id="volumeBar" min="0" max="1" step="0.05" value="1" style="width:100px">
              <button class="ctrl-btn sub-toggle" id="toggleOrigBtn" title="原文字幕の表示/非表示">原文</button>
              <button class="ctrl-btn sub-toggle" id="toggleJpBtn" title="日本語字幕の表示/非表示">日本語</button>
            </div>
          </div>
          <div class="vertical-resizer" id="verticalResizer" aria-label="動画エリア高さを調整" role="separator"></div>

          <div class="action-box">
            <div class="action-row">
              <button class="btn btn-primary" id="transcribeBtn" disabled>🎙️ 文字起こし</button>
              <button class="btn btn-primary" id="translateBtn" disabled>🇯🇵 字幕生成</button>
              <button class="btn btn-success" id="analyzeBtn" disabled>🔍 動画分析</button>
            </div>

            <div class="mini">文字起こし</div>
            <div class="progress-wrap" id="transcribeProgress" style="display:none"><div class="progress-bar-bg"><div class="progress-bar-fill" id="transcribeFill"></div></div><div class="progress-label" id="transcribeLabel">準備中...</div></div>
            <div class="result-row" id="transcribeResult"></div>

            <div class="mini">日本語字幕</div>
            <div class="progress-wrap" id="translateProgress" style="display:none"><div class="progress-bar-bg"><div class="progress-bar-fill" id="translateFill"></div></div><div class="progress-label" id="translateLabel">準備中...</div></div>
            <div class="result-row" id="translateResult"></div>

            <div class="mini">動画分析</div>
            <div class="progress-wrap" id="analyzeProgress" style="display:none"><div class="progress-bar-bg"><div class="progress-bar-fill" id="analyzeFill"></div></div><div class="progress-label" id="analyzeLabel">準備中...</div><div class="elapsed-time" id="analyzeElapsed"></div></div>
            <div class="result-row" id="analyzeResult"></div>

          </div>
        </div>

        <div class="panel-resizer" id="panelResizer" aria-label="レイアウト幅を調整" role="separator"></div>
        <aside class="analysis-column">
          <section class="analysis-pane">
            <div class="analysis-header" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <span>分析/編集</span>
              <div style="display:flex;gap:6px">
                <button class="btn btn-ghost" id="analysisTabBtn" style="font-size:11px;padding:3px 10px">分析</button>
                <button class="btn btn-ghost" id="tocTabBtn" style="font-size:11px;padding:3px 10px">編集</button>
              </div>
            </div>
            <div class="analysis-scroll">
              <div id="analysisView">
                <div class="card analysis-detail" id="analysisDetail" style="display:none">
                  <span class="genre-tag" id="genreTag"></span>
                  <div class="summary-text" id="summaryText"></div>
                  <hr class="divider">
                  <div class="mini">シーン</div>
                  <div class="scenes-list" id="scenesList"></div>
                  <hr class="divider">
                  <div class="mini">タグ</div>
                  <div class="tags-wrap" id="tagsWrap"></div>
                </div>
                <div id="analysisEmpty" class="qa-placeholder" style="padding:16px">分析するとここに結果を表示します</div>
              </div>
              <div id="tocView" style="display:none">
                <div class="card analysis-detail" style="display:block">
                  <div class="model-apply-row" style="margin-top:0">
                    <button class="btn btn-ghost" id="tocAddBtn" style="padding:4px 10px;font-size:12px">＋ チャプター追加</button>
                    <button class="btn btn-primary" id="tocSaveBtn" style="margin-left:auto;padding:4px 12px;font-size:12px">保存</button>
                  </div>
                  <div class="result-row" id="tocResult" style="margin-top:8px"></div>
                  <div class="mini">チャプター</div>
                  <div id="tocEditList" class="scenes-list"></div>
                  <div id="tocEmpty" class="qa-placeholder" style="padding:16px;display:none">目次データがありません</div>
                </div>
              </div>
            </div>
          </section>
        </aside>

        <aside class="qa-panel">
            <div class="qa-header">
              <div class="qa-title">動画に質問する</div>
              <button class="btn btn-ghost" id="clearHistoryBtn" style="font-size:11px;padding:3px 10px">履歴をクリア</button>
            </div>
            <div class="qa-history" id="qaHistory">
              <div class="qa-placeholder" id="qaPlaceholder">動画を読み込むと質問できます</div>
            </div>
            <div class="qa-input-row">
              <input type="text" class="qa-input" id="qaInput" disabled placeholder="例：この動画の要点は？">
              <button class="btn btn-primary" id="qaBtn" disabled style="padding:8px 14px">送信</button>
            </div>
        </aside>
      </div>
    </section>

    <section id="tab-settings" class="tab-panel" style="display:none">
      <main class="settings-main">
        <div class="card">
          <div class="section-label">対象動画</div>
          <div id="settingsVideoPath" style="font-size:13px;color:var(--text-dim)">動画未選択（プレイヤータブで読み込み）</div>
        </div>

        <div class="card">
          <div class="section-label">音声・辞書モデル設定</div>
          <div class="model-columns">
            <div class="model-column">
              <div class="model-group-label">翻訳モデル</div>
              <div id="translatorModelList"></div>
            </div>
            <div class="model-column">
              <div class="model-group-label">辞書モデル</div>
              <div id="lookupModelList"></div>
            </div>
          </div>
          <div class="model-apply-row">
            <button class="btn btn-ghost" id="applyModelBtn" style="padding:5px 14px;font-size:13px">適用</button>
            <span class="status-dot" id="translatorDot"></span><span id="translatorStatusText" style="color:var(--text-dim)">接続中...</span>
            <span class="status-dot" id="lookupDot" style="margin-left:8px"></span><span id="lookupStatusText" style="color:var(--text-dim)"></span>
          </div>
        </div>        <div class="card">
          <div class="section-label">動画レビュー設定</div>
          <div class="model-apply-row" style="margin-top:8px">
            <span class="status-dot" id="vlModelDot"></span><span id="vlModelStatusText" style="color:var(--text-dim)">接続中...</span>
            <button class="btn btn-ghost" id="unloadBtn" style="margin-left:auto;padding:4px 12px;font-size:12px" disabled>VRAM 解放</button>
          </div>

          <hr class="divider">

          <div class="section-label" style="margin-bottom:6px">サンプリング設定</div>
          <div style="display:flex;gap:16px;margin-bottom:10px">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
              <input type="radio" name="frameMode" value="uniform" checked style="accent-color:var(--accent)"> 均等サンプリング
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
              <input type="radio" name="frameMode" value="scene" style="accent-color:var(--accent)"> シーン検出
              <span style="font-size:11px;color:var(--text-dim)">ffmpeg</span>
            </label>
          </div>
          <div class="frame-setting">
            <label>最大フレーム数：</label>
            <input type="range" class="frame-slider" id="maxFrames" min="5" max="60" value="30" step="5">
            <span id="maxFramesValue">30 枚</span>
          </div>
          <div class="frame-setting" style="margin-top:8px">
            <label>解析モード：</label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
              <input type="radio" name="analysisMode" value="speed" checked style="accent-color:var(--accent)"> speed
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
              <input type="radio" name="analysisMode" value="balanced" style="accent-color:var(--accent)"> balanced
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
              <input type="radio" name="analysisMode" value="quality" style="accent-color:var(--accent)"> quality
            </label>
          </div>
          <div class="frame-setting" style="margin-top:8px">
            <label>出力言語：</label>
            <select id="outputLang" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px">
              <option value="ja" selected>日本語</option>
              <option value="en">英語</option>
            </select>
          </div>
          <div class="frame-hint" id="frameHint"></div>
        </div>
      </main>
    </section>
  </div>

  <script>
    const API = 'http://127.0.0.1:8765'
    const MIN_INTERVAL = 5.0
    const state = { videoPath:null, origSrtPath:null, jpSrtPath:null, origTranscript:'', analysisReady:false, tocPath:null, tocData:null }

    function switchTab(name){
      document.querySelectorAll('.tab-panel').forEach(p=>p.style.display = p.id===`tab-${name}` ? '' : 'none')
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===name))
    }
    document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)))


    function setCurrentVideo(path){
      state.videoPath = path
      const name = path ? path.split(/[\\/]/).pop() : '動画未選択'
      document.getElementById('currentVideoName').textContent = name
      document.getElementById('settingsVideoPath').textContent = path || '動画未選択（プレイヤータブで読み込み）'
      document.getElementById('transcribeBtn').disabled = !path
      document.getElementById('analyzeBtn').disabled = !path
      if(path){
        state.origSrtPath = null
        state.jpSrtPath = null
        state.origTranscript = ''
        state.tocPath = null
        state.tocData = null
        resetSection('transcribe')
        resetSection('translate')
        document.getElementById('translateBtn').disabled = true
        clearAnalysisDetail()
        renderTocEditor()
      }
      setQAEnabled(!!path)
    }

    function resetSection(kind){
      document.getElementById(`${kind}Progress`).style.display='none'
      document.getElementById(`${kind}Fill`).style.width='0%'
      document.getElementById(`${kind}Result`).innerHTML=''

    async function readSSE(response,onEvent){
      const reader=response.body.getReader()
      const decoder=new TextDecoder()
      let buf=''
      while(true){
        const {done,value}=await reader.read()
        if(done) break
        buf += decoder.decode(value,{stream:true})
        const lines=buf.split('\n')
        buf=lines.pop()
        for(const line of lines){
          if(line.startsWith('data: ')){
            try{ onEvent(JSON.parse(line.slice(6))) }catch{}
          }
        }
      }
    }

    function escHtml(str){
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')

    function parseTsToSec(ts){
      if(!ts) return null
      const m=String(ts).trim().match(/^(?:(\d+):)?(\d{1,2}):(\d{2})(?:\.(\d+))?$/)
      if(!m) return null
      const h=Number(m[1]||0), mm=Number(m[2]), s=Number(m[3]), ms=Number(`0.${m[4]||0}`)
      return h*3600+mm*60+s+ms
    }
    function fmtTs(sec){
      const s=Math.max(0,Math.floor(Number(sec)||0))
      const m=Math.floor(s/60), ss=String(s%60).padStart(2,'0')
      return `${m}:${ss}`
    }

    function renderAnalysisDetail(result){
      if(!result) return
      document.getElementById('analysisDetail').style.display = 'block'
      document.getElementById('analysisEmpty').style.display = 'none'
      document.getElementById('genreTag').textContent = result.genre || '不明'
      document.getElementById('summaryText').textContent = result.summary || ''
      document.getElementById('scenesList').innerHTML = (result.scenes || []).map(s=>{
        const start = Number.isFinite(s.start_sec) ? Number(s.start_sec) : parseTsToSec(s.timestamp)
        const tsText = s.timestamp || (Number.isFinite(start) ? fmtTs(start) : '')
        const ts = tsText ? `<span class="scene-time">${escHtml(tsText)}</span>` : ''
        const label = s.label ? `${escHtml(s.label)}: ` : ''
        const attr = Number.isFinite(start) ? ` data-start="${start}"` : ''
        return `<div class="scene-item"${attr}>${ts}<span class="scene-text">${label}${escHtml(s.description || '')}</span></div>`
      }).join('')
      document.getElementById('tagsWrap').innerHTML = (result.tags || []).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')
    }

    function renderTocDetail(data){
      if(!data) return
      state.tocData=data
      renderTocEditor()
    }

    function analysisFromTocData(data){
      const meta=data?.meta||{}
      const toc=Array.isArray(data?.toc)?data.toc:[]
      return {
        genre: meta.genre || '目次',
        summary: meta.summary || `目次 ${toc.length} 件`,
        tags: Array.isArray(meta.tags)?meta.tags:[],
        scenes: toc.map(ch=>({
          timestamp: ch.timestamp || fmtTs(ch.start_sec||0),
          label: ch.title || '',
          description: ch.summary || '',
          start_sec: ch.start_sec,
        })),
      }
    }

    function buildTocFromAnalysis(result){
      const scenes=Array.isArray(result?.scenes)?result.scenes:[]
      const toc=scenes.map((s,idx)=>{
        const start=Number.isFinite(s.start_sec)?Number(s.start_sec):(parseTsToSec(s.timestamp)||0)
        return {
          id:`ch${String(idx+1).padStart(3,'0')}`,
          start_sec:Math.max(0,start),
          end_sec:Math.max(0,start+1),
          timestamp:s.timestamp || fmtTs(start),
          title:(s.label||`チャプター${idx+1}`).trim(),
          summary:(s.description||'').trim(),
          confidence:0.8,
        }
      }).sort((a,b)=>a.start_sec-b.start_sec)
      for(let i=0;i<toc.length;i++){
        toc[i].end_sec=i+1<toc.length?toc[i+1].start_sec:(toc[i].start_sec+1)
      }
      return {
        version:1,
        video_path:state.videoPath||'',
        created_at:new Date().toISOString(),
        model:{source:'analysis'},
        meta:{
          genre:result?.genre||'不明',
          summary:result?.summary||'',
          tags:Array.isArray(result?.tags)?result.tags:[],
        },
        toc,
        bookmarks:Array.isArray(state.tocData?.bookmarks)?state.tocData.bookmarks:[],
      }
    }

    function normalizeTocData(){
      if(!state.tocData || typeof state.tocData!=='object'){
        state.tocData={version:1,video_path:state.videoPath||'',meta:{},toc:[],bookmarks:[]}
      }
      if(!Array.isArray(state.tocData.toc)) state.tocData.toc=[]
      if(!Array.isArray(state.tocData.bookmarks)) state.tocData.bookmarks=[]
      if(!state.tocData.meta || typeof state.tocData.meta!=='object') state.tocData.meta={}
      return state.tocData
    }

        return `<div class="toc-row" data-idx="${idx}">
          <div>
            <div class="mini" style="margin:0 0 4px">開始秒</div>
            <input class="toc-start" type="number" min="0" step="0.1" value="${Number.isFinite(start)?start:0}">
          </div>
          <div>
            <input class="toc-title" type="text" value="${escHtml(ch.title||'')}" placeholder="タイトル">
            <textarea class="toc-summary" placeholder="概要">${escHtml(ch.summary||'')}</textarea>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn btn-ghost toc-jump" type="button" style="padding:6px 8px;font-size:12px">移動</button>
            <button class="btn btn-ghost toc-del" type="button">削除</button>

    function collectTocFromEditor(){
      const data=normalizeTocData()
      const rows=[...document.querySelectorAll('#tocEditList .toc-row')].map((row,idx)=>{

        return {

          start_sec: start,
          end_sec: start,
          timestamp: fmtTs(start),
          title,
          summary,
          confidence: 0.8,
        }
      }).sort((a,b)=>a.start_sec-b.start_sec)
      for(let i=0;i<rows.length;i++){
        rows[i].id=`ch${String(i+1).padStart(3,'0')}`
        rows[i].end_sec=i+1<rows.length?rows[i+1].start_sec:(rows[i].start_sec+1)
      }

    }

    function parseSRT(content){
      const result=[]
      const blocks=content.trim().split(/\r?\n\r?\n/)
      for(const block of blocks){
        const lines=block.trim().split(/\r?\n/)
        if(lines.length<3) continue
        const m=lines[1].match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/)
        if(!m) continue
        const toSec=(h,min,s,ms)=> +h*3600 + +min*60 + +s + +ms/1000
        result.push({ start:toSec(m[1],m[2],m[3],m[4]), end:toSec(m[5],m[6],m[7],m[8]), text:lines.slice(2).join('\n') })
      }
      return result
    }

    function findSub(subs,t){ return subs.find(s=>t>=s.start&&t<=s.end)??null }
    function findPrevSubByTime(subs,t){
      let best=null
      for(const s of subs){
        if(s.start < t-0.001 && (!best || s.start > best.start)) best=s
      }
      return best
    }
    function findNextSubByTime(subs,t){
      let best=null
      for(const s of subs){
        if(s.start > t+0.001 && (!best || s.start < best.start)) best=s
      }
      return best
    }

    async function lookupWord(word){
      if(word in dictCache) return dictCache[word]
      try{
        const res=await fetch(`${API}/lookup`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({word})})
        if(!res.ok){ dictCache[word]=null; return null }
        const data=await res.json()
        dictCache[word]=data.definition
        return data.definition
      }catch{
        dictCache[word]=null
        return null
      }
    }

    function positionTooltip(anchorEl){
      const rect=anchorEl.getBoundingClientRect()
      const tipW=dictTooltip.offsetWidth
      const tipH=dictTooltip.offsetHeight
      let left=rect.left
      let top=rect.top-tipH-8
      if(left+tipW>window.innerWidth-8) left=window.innerWidth-tipW-8
      if(left<8) left=8
      if(top<8) top=rect.bottom+8
      dictTooltip.style.left=`${left}px`
      dictTooltip.style.top=`${top}px`
    }

    function showTooltip(anchorEl,html){
      dictTooltip.innerHTML=html
      dictTooltip.style.left='-9999px'
      dictTooltip.style.display='block'
      requestAnimationFrame(()=>positionTooltip(anchorEl))
    }

    function hideTooltip(){
      clearTimeout(hoverTimer)
      currentHoveredSpan=null
      dictTooltip.style.display='none'
    }

    function wrapWords(text, segStart, segEnd){
      const parts = String(text).split(/(\s+)/)
      const wordCount = parts.filter(p=>p.trim().length>0).length || 1
      const duration = Math.max(0, segEnd - segStart)
      const step = duration / wordCount
      let idx = 0
      return parts.map(p=>{
        if(p.trim().length===0){
          return escHtml(p).replace(/ /g,'&nbsp;').replace(/\n/g,'<br>')
        }
        const wStart = segStart + idx * step
        const wEnd = segStart + (idx + 1) * step
        idx += 1
        return `<span class="sub-word" data-start="${wStart.toFixed(3)}" data-end="${wEnd.toFixed(3)}">${escHtml(p)}</span>`
      }).join('')
    }

    function updateSubtitles(){
      const t=video.currentTime
      const o=findSub(origSubtitles,t)
      const j=findSub(jpSubtitles,t)
      if(o){
        if(renderedOrigSub !== o){
          subOrigEl.innerHTML = wrapWords(o.text, o.start, o.end)
          renderedOrigSub = o
        }
        subOrigEl.querySelectorAll('.sub-word').forEach(span=>{
          const active = t >= parseFloat(span.dataset.start) && t < parseFloat(span.dataset.end)
          span.classList.toggle('sub-word-active', active)
        })
      }else{
        subOrigEl.textContent = ''
        renderedOrigSub = null
        hideTooltip()
      }
      subJpEl.textContent = j ? j.text : ''
    }

    function toFileUrl(filePath){ return 'file:///'+filePath.replace(/\\/g,'/') }
    function loadVideo(filePath){
      video.src=toFileUrl(filePath)
      video.style.display='block'
      noVideo.style.display='none'
      origSubtitles=[]; jpSubtitles=[]
      renderedOrigSub=null
      hideTooltip()
      subOrigEl.textContent=''; subJpEl.textContent=''
      syncSubtitleClearButtons()
    }
    function subsToTranscript(subs){
      return subs.map(s=>{
        const m=Math.floor(s.start/60), sec=Math.floor(s.start%60)
        return `[${m}:${sec.toString().padStart(2,'0')}] ${s.text}`
      }).join('\n')
    }
    async function loadSrt(filePath,kind){
      const result=await window.electronAPI.readFile(filePath)
      if(!result.ok) return
      const subs=parseSRT(result.content)
      if(kind==='orig'){ origSubtitles=subs; state.origTranscript=subsToTranscript(subs); renderedOrigSub=null }
      else jpSubtitles=subs
      syncSubtitleClearButtons()
      updateSubtitles()
    }

    function clearSubtitle(kind){
      if(kind==='orig'){
        state.origSrtPath = null
        state.origTranscript = ''
        origSubtitles = []
        renderedOrigSub = null
        hideTooltip()
        subOrigEl.textContent = ''
        resetSection('transcribe')
        document.getElementById('translateBtn').disabled = true
      }else{
        state.jpSrtPath = null
        jpSubtitles = []
        subJpEl.textContent = ''
        resetSection('translate')
      }
      syncSubtitleClearButtons()
      updateSubtitles()
    }

    async function tryAutoLoadSrt(videoFilePath){
      const stem=videoFilePath.replace(/\.[^.]+$/,'')
      const targets=[{path:stem+'.original.srt',kind:'orig'},{path:stem+'.japanese.srt',kind:'jp'}]
      for(const {path,kind} of targets){
        const result=await window.electronAPI.readFile(path)
        if(result.ok){
          if(kind==='orig'){ state.origSrtPath=path; await loadSrt(path,'orig'); document.getElementById('translateBtn').disabled=false; setResult('transcribe',true,path) }
          else { state.jpSrtPath=path; await loadSrt(path,'jp'); setResult('translate',true,path) }
        }
      }
    }

        if(!res.ok) return
        const body=await res.json()
        state.tocPath=body.toc_path
        renderTocDetail(body.data)
        renderAnalysisDetail(analysisFromTocData(body.data))
        setResult('toc',true,state.tocPath)
      }catch{}
    }

    })
    toggleJpBtn.addEventListener('click',()=>{
      const hidden=subJpEl.style.display==='none'
      subJpEl.style.display=hidden?'':'none'
      toggleJpBtn.classList.toggle('sub-off',!hidden)
    })

    const videoWrap=document.getElementById('videoWrap')
    window.addEventListener('dragover',e=>e.preventDefault())
    window.addEventListener('drop',e=>e.preventDefault())
    videoWrap.addEventListener('drop',async e=>{
      e.preventDefault()
      const file=e.dataTransfer.files[0]
      if(!file) return
      const p=window.electronAPI.getPathForFile(file)
      if(!p) return
      setCurrentVideo(p); loadVideo(p); await tryAutoLoadSrt(p); await tryAutoLoadToc(p)
    })

    const slider=document.getElementById('maxFrames')
    const outputLangSel=document.getElementById('outputLang')
    function getFrameMode(){ return document.querySelector('input[name="frameMode"]:checked').value }
    function getAnalysisMode(){ return document.querySelector('input[name="analysisMode"]:checked').value }
    function getOutputLang(){ return outputLangSel.value==='en'?'en':'ja' }
    function updateFrameHint(){
      document.getElementById('maxFramesValue').textContent=slider.value+' 枚'
      const frameHint=getFrameMode()==='scene'
        ? `映像の変化点を検出して最大 ${slider.value} 枚を抽出します。`
        : `最低 ${MIN_INTERVAL} 秒間隔で最大 ${slider.value} 枚をサンプリングします。`
      const modeHint=getAnalysisMode()==='speed'
        ? '1段階解析（高速）'
        : (getAnalysisMode()==='balanced' ? '2段階解析（バランス）' : '2段階解析（高精度）')
      document.getElementById('frameHint').textContent=`${frameHint} / ${modeHint}`
    }
    slider.addEventListener('input',updateFrameHint)
    slider.addEventListener('change',()=>saveUiSettings({max_frames:parseInt(slider.value)}))
    document.querySelectorAll('input[name="frameMode"]').forEach(r=>r.addEventListener('change',()=>{
      updateFrameHint(); saveUiSettings({frame_mode:getFrameMode()})
    }))
    document.querySelectorAll('input[name="analysisMode"]').forEach(r=>r.addEventListener('change',()=>{
      updateFrameHint(); saveUiSettings({analysis_mode:getAnalysisMode()})
    }))
    outputLangSel.addEventListener('change',()=>saveUiSettings({output_lang:getOutputLang()}))


    async function saveUiSettings(data){
      try{ await fetch(`${API}/ui-settings`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}) }catch{}
    }

    async function loadUiSettings(){
      try{
        const res=await fetch(`${API}/ui-settings`); if(!res.ok) return
        const s=await res.json()
        const fmRadio=document.querySelector(`input[name="frameMode"][value="${s.frame_mode}"]`)
        if(fmRadio) fmRadio.checked=true
        const amRadio=document.querySelector(`input[name="analysisMode"][value="${s.analysis_mode||'speed'}"]`)
        if(amRadio) amRadio.checked=true
        slider.value=s.max_frames
        if(typeof s.volume==='number'){
          const v=Math.max(0,Math.min(1,Number(s.volume)))
          volumeBar.value=String(v)
          video.volume=v
        }
        if(typeof s.playback_rate==='number'){
          const allowed=[0.5,0.75,1,1.25,1.5]
          const r=allowed.includes(Number(s.playback_rate))?Number(s.playback_rate):1
          speedSelect.value=String(r)
          video.playbackRate=r
        }
        outputLangSel.value=(s.output_lang==='en')?'en':'ja'
        updateFrameHint()
      }catch{}
    }

    function renderModelList(containerId, radioName, available, current){
      document.getElementById(containerId).innerHTML=available.map(m=>`<label class="model-option"><input type="radio" name="${radioName}" value="${m.id}" ${m.id===current?'checked':''}><span>${m.label}</span><span class="model-meta">~${m.vram_gb} GB · ${m.note}</span></label>`).join('')
    }
    function setModelStatus(dotId,textId,info,label){
      const dot=document.getElementById(dotId), text=document.getElementById(textId)
      dot.classList.toggle('loaded',info.loaded)
      const modelLabel=info.available.find(m=>m.id===info.current)?.label ?? info.current
      text.textContent=`${label}: ${info.loaded?'ロード済み':'未ロード'}（${modelLabel}）`
    }

    async function fetchLanguageModels(){
      try{
        const res=await fetch(`${API}/models`); if(!res.ok) return
        const {translator:tInfo,lookup:lInfo}=await res.json()
        renderModelList('translatorModelList','translatorModel',tInfo.available,tInfo.current)
        renderModelList('lookupModelList','lookupModel',lInfo.available,lInfo.current)
        setModelStatus('translatorDot','translatorStatusText',tInfo,'翻訳')
        setModelStatus('lookupDot','lookupStatusText',lInfo,'辞書')
      }catch{
        document.getElementById('translatorStatusText').textContent='バックエンド未起動'
      }
    }

    document.getElementById('applyModelBtn').addEventListener('click',async()=>{
      const tSel=document.querySelector('input[name="translatorModel"]:checked')
      const lSel=document.querySelector('input[name="lookupModel"]:checked')
      const body={}; if(tSel) body.translator=tSel.value; if(lSel) body.lookup=lSel.value
      await fetch(`${API}/models`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      await fetchLanguageModels()
    })

    async function fetchReviewModelStatus(){
      try{
        const res=await fetch(`${API}/review/models`); if(!res.ok) return
        const info=await res.json()
        const dot=document.getElementById('vlModelDot'), text=document.getElementById('vlModelStatusText'), unloadBtn=document.getElementById('unloadBtn')
        dot.classList.toggle('loaded',info.loaded)
        const label=info.available.find(m=>m.id===info.current)?.label ?? info.current
        text.textContent=info.loaded ? `${label} ロード済み` : `${label} 未ロード`
        unloadBtn.disabled=!info.loaded
      }catch{ document.getElementById('vlModelStatusText').textContent='バックエンド未起動' }
    }
    document.getElementById('unloadBtn').addEventListener('click',async()=>{ await fetch(`${API}/review/unload`,{method:'POST'}); await fetchReviewModelStatus() })

    document.getElementById('transcribeBtn').addEventListener('click',async()=>{
      if(!state.videoPath){ setResult('transcribe',false,'先に動画を読み込んでください'); return }
      const btn=document.getElementById('transcribeBtn'); btn.disabled=true
      resetSection('transcribe'); setProgress('transcribe',5,'準備中...')
      try{
        const res=await fetch(`${API}/transcribe`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({video_path:state.videoPath,language:null})})
        await readSSE(res,event=>{
          if(event.status==='loading_model') setProgress('transcribe',10,'ASR モデルをロード中...')
          else if(event.status==='extracting_audio') setProgress('transcribe',30,'音声を抽出中...')
          else if(event.status==='saving_srt') setProgress('transcribe',80,`SRT 生成中 (${event.segments})`)
          else if(event.status==='done'){ setProgress('transcribe',100,'完了'); state.origSrtPath=event.srt_path; setResult('transcribe',true,state.origSrtPath); document.getElementById('translateBtn').disabled=false; loadSrt(state.origSrtPath,'orig') }
          else if(event.status==='error') setResult('transcribe',false,event.message)
        })
      }catch(e){ setResult('transcribe',false,`接続エラー: ${e.message}`) }
      btn.disabled=!state.videoPath
    })

    document.getElementById('translateBtn').addEventListener('click',async()=>{
      if(!state.origSrtPath){ setResult('translate',false,'先に文字起こしを実行してください'); return }
      const btn=document.getElementById('translateBtn'); btn.disabled=true
      resetSection('translate'); setProgress('translate',0,'準備中...')
      try{
        const res=await fetch(`${API}/translate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({srt_path:state.origSrtPath})})
        await readSSE(res,event=>{
          if(event.status==='loading_model') setProgress('translate',5,'翻訳モデルをロード中...')
          else if(event.status==='translating'){ const pct=event.total>0?Math.round(event.current/event.total*100):0; setProgress('translate',pct,`翻訳中 ${event.current}/${event.total}`) }
          else if(event.status==='done'){ setProgress('translate',100,'完了'); state.jpSrtPath=event.srt_path; setResult('translate',true,state.jpSrtPath); loadSrt(state.jpSrtPath,'jp') }
          else if(event.status==='error') setResult('translate',false,event.message)
        })
      }catch(e){ setResult('translate',false,`接続エラー: ${e.message}`) }
      btn.disabled=false
    })

    document.getElementById('analyzeBtn').addEventListener('click',async()=>{
      if(!state.videoPath){ setResult('analyze',false,'先に動画を読み込んでください'); return }
      const btn=document.getElementById('analyzeBtn'); btn.disabled=true
      resetSection('analyze')
      startAnalyzeTimer()
      try{
        const res=await fetch(`${API}/review/analyze`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({video_path:state.videoPath,max_frames:parseInt(document.getElementById('maxFrames').value),min_interval:MIN_INTERVAL,transcript:state.origTranscript,frame_mode:getFrameMode(),analysis_mode:getAnalysisMode(),output_lang:getOutputLang()})})
        await readSSE(res,event=>{
          if(event.status==='loading_model') setProgress('analyze',15,'モデルをロード中...')
          else if(event.status==='extracting_frames') setProgress('analyze',35,'フレーム抽出中...')
          else if(event.status==='analyzing') setProgress('analyze',70,`${event.count} 枚を分析中（${event.mode==='scene'?'シーン検出':'均等'}）`)
          else if(event.status==='done'){
            stopAnalyzeTimer()
            setProgress('analyze',100,'完了')
            setResult('analyze',true,'分析完了（編集タブに目次下書きを作成）')
            renderAnalysisDetail(event.result)
            state.tocPath=null
            renderTocDetail(buildTocFromAnalysis(event.result))
            setResult('toc',true,'未保存（保存ボタンでJSON保存）')
            switchAnalysisPane('analysis')
          }
          else if(event.status==='error'){ stopAnalyzeTimer(); setResult('analyze',false,event.message) }
        })
      }catch(e){ stopAnalyzeTimer(); setResult('analyze',false,`接続エラー: ${e.message}`) }
      btn.disabled=!state.videoPath
    })

    const qaInput=document.getElementById('qaInput')
    const qaBtn=document.getElementById('qaBtn')
    const qaHistory=document.getElementById('qaHistory')

    async function submitQuestion(){
      const q=qaInput.value.trim()
      if(!q || !state.videoPath) return
      qaInput.value=''; qaBtn.disabled=true

      const pair=document.createElement('div')
      pair.innerHTML=`<div class="qa-question">${escHtml(q)}</div>`
      const thinking=document.createElement('div')
      thinking.className='qa-answering'
      thinking.textContent='回答生成中...'
      pair.appendChild(thinking)
      const ans=document.createElement('div')
      ans.className='qa-answer'
      ans.style.display='none'
      pair.appendChild(ans)
      const elapsed=document.createElement('div')
      elapsed.className='qa-elapsed'
      pair.appendChild(elapsed)
      qaHistory.appendChild(pair)
      pair.scrollIntoView({behavior:'smooth'})

      const qaStart=Date.now()
      const qaTimer=setInterval(()=>{
        const s=Math.floor((Date.now()-qaStart)/1000)
        elapsed.textContent=`経過: ${s}秒`
      },1000)
      const stopQaTimer=(label)=>{
        clearInterval(qaTimer)
        const s=Math.floor((Date.now()-qaStart)/1000)
        elapsed.textContent=`${label}: ${s}秒`
      }

      try{
        const res=await fetch(`${API}/review/qa`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({video_path:state.videoPath,question:q,max_frames:parseInt(document.getElementById('maxFrames').value),min_interval:MIN_INTERVAL,transcript:state.origTranscript,frame_mode:getFrameMode()})})
        await readSSE(res,event=>{
          if(event.status==='extracting_frames') thinking.textContent='フレーム抽出中...'
          else if(event.status==='answering') thinking.textContent='回答生成中...'
          else if(event.status==='answer_delta'){
            if(ans.style.display==='none'){
              ans.style.display=''
              thinking.style.display='none'
            }
            ans.textContent += event.delta || ''
            pair.scrollIntoView({behavior:'smooth'})
          }
          else if(event.status==='done'){
            if((ans.textContent || '').trim().length===0){
              ans.style.display=''
              ans.textContent=event.answer || ''
              thinking.style.display='none'
            }
            stopQaTimer('完了')
          }
          else if(event.status==='error'){ thinking.textContent='❌ '+event.message; stopQaTimer('エラー') }
        })
      }catch(e){ thinking.textContent='❌ 接続エラー: '+e.message; stopQaTimer('エラー') }

      qaBtn.disabled=false
    }

    qaBtn.addEventListener('click',submitQuestion)
    qaInput.addEventListener('keydown',e=>{ if(e.key==='Enter' && !e.isComposing) submitQuestion() })
    document.getElementById('clearHistoryBtn').addEventListener('click',()=>{
      const ph=document.getElementById('qaPlaceholder')
      qaHistory.innerHTML=''
      if(ph) qaHistory.appendChild(ph)
      ph.style.display=qaInput.disabled?'flex':'none'
    })

    const playerShell = document.querySelector('.player-shell')
    const panelResizer = document.getElementById('panelResizer')
    const playerLeft = document.querySelector('.player-left')
    const verticalResizer = document.getElementById('verticalResizer')
    const playerLayoutEl = document.querySelector('.player-layout')
    let resizing = false
    let verticalResizing = false
    function setSplitByX(clientX){
      const rect = playerShell.getBoundingClientRect()
      const divider = 8
      const minLeft = 280
      const minRight = 400
      let left = clientX - rect.left
      left = Math.max(minLeft, Math.min(left, rect.width - minRight - divider))
      playerShell.style.gridTemplateColumns = `${left}px ${divider}px 1fr 1fr`
    }
    panelResizer.addEventListener('pointerdown', e=>{
      if(window.innerWidth <= 1100) return
      resizing = true
      panelResizer.setPointerCapture(e.pointerId)
      document.body.style.cursor = 'col-resize'
      document.body.style.userSelect = 'none'
    })
    panelResizer.addEventListener('pointermove', e=>{
      if(!resizing) return
      setSplitByX(e.clientX)
    })
    panelResizer.addEventListener('pointerup', ()=>{
      resizing = false
      document.body.style.cursor = ''
      document.body.style.userSelect = ''
    })
    panelResizer.addEventListener('dblclick', ()=>{
      playerShell.style.gridTemplateColumns = ''
    })

    function setVideoHeightByY(clientY){
      const rect = playerLeft.getBoundingClientRect()
      const topBarEl = document.querySelector('.player-top')
      const actionEl = document.querySelector('.action-box')
      const topBarH = topBarEl ? topBarEl.offsetHeight : 0
      const resizerH = 8
      const minVideo = 220
      const minAction = 180
      const available = rect.height - topBarH - resizerH
      let videoH = clientY - rect.top - topBarH
      videoH = Math.max(minVideo, Math.min(videoH, available - minAction))
      playerLayoutEl.style.flex = `0 0 ${Math.round(videoH)}px`
      if(actionEl) actionEl.style.flex = '1 1 auto'
    }
    verticalResizer.addEventListener('pointerdown', e=>{
      verticalResizing = true
      verticalResizer.setPointerCapture(e.pointerId)
      document.body.style.cursor = 'row-resize'
      document.body.style.userSelect = 'none'
    })
    verticalResizer.addEventListener('pointermove', e=>{
      if(!verticalResizing) return
      setVideoHeightByY(e.clientY)
    })
    verticalResizer.addEventListener('pointerup', ()=>{
      verticalResizing = false
      document.body.style.cursor = ''
      document.body.style.userSelect = ''
    })
    verticalResizer.addEventListener('dblclick', ()=>{
      playerLayoutEl.style.flex = '0 0 clamp(320px,52vh,580px)'
    })

    switchTab('player')
    updateFrameHint()
    fetchLanguageModels()
    fetchReviewModelStatus()
    loadUiSettings()
    setQAEnabled(false)
    syncSubtitleClearButtons()
    renderTocEditor()
    switchAnalysisPane('analysis')
  </script>
</body>
</html>
