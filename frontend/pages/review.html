<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画レビュー – Language Caption Player</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ---------- 左右分割レイアウト ---------- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    .left-panel {
      flex: 1;
      min-width: 0;
      max-width: 680px;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .right-panel {
      width: 340px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ---------- ファイルドロップゾーン ---------- */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(74, 158, 255, 0.05);
    }
    .drop-zone .icon { font-size: 28px; margin-bottom: 6px; }
    .drop-zone .hint { color: var(--text-dim); font-size: 13px; margin-top: 4px; }

    .file-info {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
      font-size: 13px;
    }
    .file-info.visible { display: flex; }
    .file-info .filename { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .change-btn {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 12px; padding: 2px 8px; border-radius: 4px;
    }
    .change-btn:hover { color: var(--text); background: var(--border); }

    /* ---------- セクションラベル ---------- */
    .section-label {
      font-size: 12px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
    }

    /* ---------- モデル選択 ---------- */
    .model-option {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: var(--radius);
      cursor: pointer; font-size: 13px;
    }
    .model-option:hover { background: var(--surface2); }
    .model-option input[type="radio"] { accent-color: var(--accent); cursor: pointer; }
    .model-meta { color: var(--text-dim); font-size: 12px; }
    .model-status {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px; font-size: 12px; color: var(--text-dim);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim); flex-shrink: 0;
    }
    .status-dot.loaded { background: var(--success); }

    /* ---------- フレーム設定 ---------- */
    .frame-setting {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .frame-setting label { color: var(--text-dim); font-size: 13px; white-space: nowrap; }
    .frame-slider {
      flex: 1; min-width: 120px; max-width: 200px;
      accent-color: var(--accent);
    }
    .frame-value { font-size: 13px; font-weight: 600; min-width: 40px; }
    .frame-hint { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

    /* ---------- 分析ボタン ---------- */
    .action-row { display: flex; gap: 8px; align-items: center; }
    .btn-analyze { flex: 1; justify-content: center; font-size: 15px; padding: 12px; }

    /* ---------- 結果カード ---------- */
    .result-section { display: none; }
    .result-section.visible { display: block; }

    .summary-text { line-height: 1.8; color: var(--text); font-size: 14px; }

    .genre-tag {
      display: inline-block; padding: 3px 12px;
      background: rgba(74,158,255,0.15); color: var(--accent);
      border-radius: 99px; font-size: 12px; margin-bottom: 12px;
    }

    .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag {
      padding: 3px 10px; border-radius: 99px; font-size: 12px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    }

    .scenes-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .scene-item {
      display: flex; gap: 12px; padding: 10px 12px;
      background: var(--surface2); border-radius: var(--radius);
      border-left: 3px solid var(--accent);
    }
    .scene-label {
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap;
    }
    .scene-timestamp {
      font-size: 11px; font-weight: 600; color: var(--accent);
      font-variant-numeric: tabular-nums; white-space: nowrap;
      background: rgba(74,158,255,0.12); border-radius: 4px;
      padding: 1px 6px; align-self: flex-start; margin-top: 2px;
    }
    .scene-desc { font-size: 13px; color: var(--text); line-height: 1.6; }

    /* ---------- 右パネル Q&A ---------- */
    .qa-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .qa-header .section-label { margin-bottom: 0; }

    .qa-history {
      flex: 1; overflow-y: auto;
      padding: 12px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .qa-placeholder {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 13px; text-align: center;
      padding: 24px; line-height: 1.7;
    }

    .qa-pair { display: flex; flex-direction: column; gap: 6px; }
    .qa-question {
      align-self: flex-end;
      background: var(--accent); color: #fff;
      padding: 8px 12px; border-radius: 12px 12px 4px 12px;
      font-size: 13px; max-width: 85%;
    }
    .qa-answer {
      align-self: flex-start;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 8px 12px; border-radius: 4px 12px 12px 12px;
      font-size: 13px; color: var(--text); max-width: 90%; line-height: 1.6;
    }
    .qa-answering {
      align-self: flex-start; color: var(--text-dim); font-size: 12px; padding: 4px 0;
    }

    .qa-input-row {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
      flex-shrink: 0;
    }
    .qa-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: var(--radius);
      font-size: 13px; outline: none;
    }
    .qa-input:focus { border-color: var(--accent); }
    .qa-input::placeholder { color: var(--text-dim); }
    .qa-input:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ---------- 不確定プログレスバー ---------- */
    @keyframes indeterminate {
      0%   { left: -40%; width: 40%; }
      60%  { left: 100%; width: 40%; }
      100% { left: 100%; width: 40%; }
    }
    .progress-bar-fill.indeterminate {
      position: relative;
      width: 40% !important;
      animation: indeterminate 1.4s ease infinite;
    }

    /* ---------- 経過時間 ---------- */
    .elapsed {
      display: inline-block; margin-left: 8px;
      color: var(--accent); font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>動画レビュー</h1>
  </header>

  <main class="main">

    <!-- ======== 左パネル ======== -->
    <div class="left-panel">

      <!-- ① 動画選択 -->
      <div>
        <div class="drop-zone" id="dropZone">
          <div class="icon">🎬</div>
          <div>動画ファイルをドロップ、またはクリックして選択</div>
          <div class="hint">MP4 / MKV / AVI / MOV / WebM</div>
        </div>
        <div class="file-info" id="fileInfo">
          <span>🎬</span>
          <span class="filename" id="fileName"></span>
          <button class="change-btn" id="changeBtn">変更</button>
        </div>
      </div>

      <!-- ② VL モデル設定 -->
      <div class="card">
        <div class="section-label">ビジョンモデル</div>
        <div id="modelList"></div>
        <div class="model-status">
          <span class="status-dot" id="modelDot"></span>
          <span id="modelStatusText">接続中...</span>
          <button class="btn btn-ghost" id="unloadBtn"
                  style="margin-left:auto; display:none; padding:4px 12px; font-size:12px">
            VRAM 解放
          </button>
        </div>
      </div>

      <!-- ③ フレーム設定 -->
      <div class="card">
        <div class="section-label">サンプリング設定</div>
        <div class="frame-setting">
          <label>最大フレーム数：</label>
          <input type="range" class="frame-slider" id="maxFrames"
                 min="5" max="60" value="30" step="5">
          <span class="frame-value" id="maxFramesValue">30 枚</span>
        </div>
        <div class="frame-hint" id="frameHint">
          動画の長さに応じてサンプリング間隔が自動調整されます（最低 5 秒間隔）
        </div>
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; margin-top:12px; color:var(--text)">
          <input type="checkbox" id="includeAudio" style="accent-color:var(--accent); width:15px; height:15px">
          音声も解析する（ASR を使用 — 追加で数分かかる場合があります）
        </label>
      </div>

      <!-- ④ 分析実行 -->
      <div class="action-row">
        <button class="btn btn-primary btn-analyze" id="analyzeBtn" disabled>
          🔍 動画を分析する
        </button>
      </div>
      <div class="progress-wrap" id="analyzeProgress" style="display:none">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="analyzeFill"></div></div>
        <div class="progress-label" id="analyzeLabel">準備中...</div>
      </div>

      <!-- ⑤ 分析結果 -->
      <div class="result-section card" id="resultSection">
        <div class="section-label">分析結果</div>

        <span class="genre-tag" id="genreTag"></span>

        <div class="summary-text" id="summaryText"></div>

        <hr class="divider">

        <div class="section-label" style="margin-bottom:8px">シーン構成</div>
        <div class="scenes-list" id="scenesList"></div>

        <hr class="divider">

        <div class="section-label" style="margin-bottom:8px">タグ</div>
        <div class="tags-wrap" id="tagsWrap"></div>
      </div>

      <!-- ⑤.5 音声書き起こし（音声解析時のみ表示） -->
      <details class="card" id="transcriptSection" style="display:none">
        <summary style="cursor:pointer; font-size:12px; font-weight:600; color:var(--text-dim);
                        text-transform:uppercase; letter-spacing:0.06em; list-style:none;
                        display:flex; align-items:center; gap:6px">
          <span>▶</span><span>音声書き起こし</span>
          <span id="transcriptChars" style="font-weight:400; text-transform:none; letter-spacing:0; margin-left:4px"></span>
        </summary>
        <div id="transcriptText" style="margin-top:12px; font-size:13px; line-height:1.7;
                                        white-space:pre-wrap; color:var(--text)"></div>
      </details>

    </div><!-- /left-panel -->

    <!-- ======== 右パネル（Q&A） ======== -->
    <div class="right-panel">
      <div class="qa-header">
        <div class="section-label">動画に質問する</div>
        <button class="btn btn-ghost" id="clearHistoryBtn"
                style="font-size:11px; padding:3px 10px">履歴をクリア</button>
      </div>

      <div class="qa-history" id="qaHistory">
        <div class="qa-placeholder" id="qaPlaceholder">
          分析が完了すると<br>ここで質問できます
        </div>
      </div>

      <div class="qa-input-row">
        <input type="text" class="qa-input" id="qaInput" disabled
               placeholder="例：何人の人物が登場しますか？">
        <button class="btn btn-primary" id="qaBtn" disabled style="padding: 9px 16px">送信</button>
      </div>
    </div><!-- /right-panel -->

  </main>

  <script>
    const API = 'http://127.0.0.1:8765'
    const MIN_INTERVAL = 5.0

    let videoPath = null
    let cachedTranscript = ''
    let _analysisStart = null

    // ---------- 動画選択 ----------
    const dropZone = document.getElementById('dropZone')
    const fileInfo  = document.getElementById('fileInfo')
    const fileName  = document.getElementById('fileName')

    async function selectVideo() {
      const p = await window.electronAPI.openVideo()
      if (p) setVideo(p)
    }

    function setVideo(p) {
      videoPath = p
      fileName.textContent = p.split(/[\\/]/).pop()
      dropZone.style.display = 'none'
      fileInfo.classList.add('visible')
      document.getElementById('analyzeBtn').disabled = false
      updateFrameHint()
    }

    dropZone.addEventListener('click', selectVideo)
    document.getElementById('changeBtn').addEventListener('click', selectVideo)
    window.addEventListener('dragover', e => e.preventDefault())
    window.addEventListener('drop',     e => e.preventDefault())
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over') })
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'))
    dropZone.addEventListener('drop', async e => {
      e.preventDefault()
      dropZone.classList.remove('drag-over')
      const file = e.dataTransfer.files[0]
      if (file) setVideo(window.electronAPI.getPathForFile(file))
    })

    // ---------- フレーム設定 ----------
    const slider = document.getElementById('maxFrames')
    const sliderVal = document.getElementById('maxFramesValue')

    slider.addEventListener('input', () => {
      sliderVal.textContent = slider.value + ' 枚'
      updateFrameHint()
    })

    function updateFrameHint() {
      const maxF = parseInt(slider.value)
      document.getElementById('frameHint').textContent =
        `最低 ${MIN_INTERVAL} 秒間隔で最大 ${maxF} 枚をサンプリングします。` +
        `短い動画では枚数が少なくなることがあります。`
    }

    updateFrameHint()

    // ---------- SSE ユーティリティ ----------
    async function readSSE(response, onEvent) {
      const reader = response.body.getReader()
      const decoder = new TextDecoder()
      let buf = ''
      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        buf += decoder.decode(value, { stream: true })
        const lines = buf.split('\n')
        buf = lines.pop()
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try { onEvent(JSON.parse(line.slice(6))) } catch {}
          }
        }
      }
    }

    let _elapsedTimer = null

    function setProgress(pct, label, { indeterminate = false, elapsed = false } = {}) {
      document.getElementById('analyzeProgress').style.display = 'block'
      const fill = document.getElementById('analyzeFill')
      const lbl  = document.getElementById('analyzeLabel')

      fill.classList.toggle('indeterminate', indeterminate)
      if (!indeterminate) fill.style.width = pct + '%'

      if (_elapsedTimer) { clearInterval(_elapsedTimer); _elapsedTimer = null }
      if (elapsed) {
        const start = Date.now()
        const span  = document.createElement('span')
        span.className = 'elapsed'
        lbl.textContent = label
        lbl.appendChild(span)
        _elapsedTimer = setInterval(() => {
          span.textContent = ` (${((Date.now() - start) / 1000).toFixed(0)}秒経過)`
        }, 1000)
      } else {
        lbl.textContent = label
      }
    }

    function stopProgress() {
      if (_elapsedTimer) { clearInterval(_elapsedTimer); _elapsedTimer = null }
    }

    // ---------- 分析実行 ----------
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
      const btn = document.getElementById('analyzeBtn')
      btn.disabled = true
      document.getElementById('analyzeProgress').style.display = 'block'
      document.getElementById('analyzeFill').style.width = '0%'
      document.getElementById('resultSection').classList.remove('visible')
      document.getElementById('transcriptSection').style.display = 'none'
      cachedTranscript = ''
      _analysisStart = Date.now()

      // Q&A をリセット
      setQAEnabled(false)

      const maxFrames    = parseInt(slider.value)
      const includeAudio = document.getElementById('includeAudio').checked

      // 音声あり：loading_asr=5, transcribing=10, asr_done=30, loading_model=35, extracting=55, analyzing=65
      // 音声なし：loading_model=5, extracting=25, analyzing=40

      try {
        const res = await fetch(`${API}/review/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            video_path:    videoPath,
            max_frames:    maxFrames,
            min_interval:  MIN_INTERVAL,
            include_audio: includeAudio,
          }),
        })
        await readSSE(res, event => {
          if (event.status === 'loading_asr') {
            setProgress(5, 'ASR モデルをロード中...', { indeterminate: true, elapsed: true })
          } else if (event.status === 'transcribing') {
            setProgress(10, '音声を書き起こし中...', { indeterminate: true, elapsed: true })
          } else if (event.status === 'asr_done') {
            setProgress(30, `書き起こし完了（${event.chars} 文字）`)
          } else if (event.status === 'loading_model') {
            const pct = includeAudio ? 35 : 5
            setProgress(pct, 'VL モデルをロード中（初回のみ数分かかります）...', { indeterminate: true, elapsed: true })
          } else if (event.status === 'extracting_frames') {
            const pct = includeAudio ? 55 : 25
            setProgress(pct, 'フレームを抽出中...')
          } else if (event.status === 'analyzing') {
            const pct = includeAudio ? 65 : 40
            setProgress(pct,
              `${event.count} 枚のフレームを分析中（間隔 ${event.interval.toFixed(1)} 秒）`,
              { indeterminate: true, elapsed: true }
            )
          } else if (event.status === 'done') {
            stopProgress()
            const totalSec = Math.round((Date.now() - _analysisStart) / 1000)
            setProgress(100, `✓ 分析完了（${totalSec} 秒）`)
            cachedTranscript = event.transcript || ''
            renderResult(event.result)
            if (cachedTranscript) renderTranscript(cachedTranscript)
            fetchModelStatus()
          } else if (event.status === 'error') {
            stopProgress()
            setProgress(0, '❌ エラー: ' + event.message)
          }
        })
      } catch (e) {
        stopProgress()
        document.getElementById('analyzeLabel').textContent = '❌ 接続エラー: ' + e.message
      }
      btn.disabled = false
    })

    // ---------- 結果レンダリング ----------
    function renderResult(r) {
      document.getElementById('genreTag').textContent = r.genre || '不明'
      document.getElementById('summaryText').textContent = r.summary || ''

      const scenesList = document.getElementById('scenesList')
      scenesList.innerHTML = (r.scenes || []).map(s => `
        <div class="scene-item">
          <div style="display:flex; flex-direction:column; gap:4px; flex-shrink:0">
            ${s.timestamp ? `<span class="scene-timestamp">${escHtml(s.timestamp)}</span>` : ''}
            <span class="scene-label">${escHtml(s.label)}</span>
          </div>
          <span class="scene-desc">${escHtml(s.description)}</span>
        </div>
      `).join('')

      document.getElementById('tagsWrap').innerHTML =
        (r.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('')

      document.getElementById('resultSection').classList.add('visible')
      setQAEnabled(true)
    }

    function renderTranscript(text) {
      document.getElementById('transcriptText').textContent = text
      document.getElementById('transcriptChars').textContent = `（${text.length} 文字）`
      document.getElementById('transcriptSection').style.display = 'block'
    }

    function setQAEnabled(enabled) {
      const input = document.getElementById('qaInput')
      const btn   = document.getElementById('qaBtn')
      const ph    = document.getElementById('qaPlaceholder')
      input.disabled = !enabled
      btn.disabled   = !enabled
      if (ph) ph.style.display = enabled ? 'none' : 'flex'
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }

    // ---------- Q&A ----------
    const qaInput   = document.getElementById('qaInput')
    const qaBtn     = document.getElementById('qaBtn')
    const qaHistory = document.getElementById('qaHistory')

    async function submitQuestion() {
      const q = qaInput.value.trim()
      if (!q || !videoPath) return

      qaInput.value = ''
      qaBtn.disabled = true

      const maxFrames = parseInt(slider.value)

      const pair = document.createElement('div')
      pair.className = 'qa-pair'
      pair.innerHTML = `<div class="qa-question">${escHtml(q)}</div>`
      const thinking = document.createElement('div')
      thinking.className = 'qa-answering'
      thinking.textContent = 'フレームを抽出中...'
      const qaStart = Date.now()
      const qaTimer = setInterval(() => {
        const sec = ((Date.now() - qaStart) / 1000).toFixed(0)
        thinking.textContent = thinking.dataset.msg
          ? `${thinking.dataset.msg} (${sec}秒経過)`
          : `処理中... (${sec}秒経過)`
      }, 1000)
      pair.appendChild(thinking)
      qaHistory.appendChild(pair)
      pair.scrollIntoView({ behavior: 'smooth' })

      try {
        const res = await fetch(`${API}/review/qa`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            video_path:   videoPath,
            question:     q,
            max_frames:   maxFrames,
            min_interval: MIN_INTERVAL,
            transcript:   cachedTranscript,
          }),
        })
        await readSSE(res, event => {
          if (event.status === 'loading_model') {
            thinking.dataset.msg = 'VL モデルをロード中...'
            thinking.textContent = thinking.dataset.msg
          } else if (event.status === 'extracting_frames') {
            thinking.dataset.msg = 'フレームを抽出中...'
            thinking.textContent = thinking.dataset.msg
          } else if (event.status === 'answering') {
            thinking.dataset.msg = `${event.count} 枚のフレームを参照して回答中...`
            thinking.textContent = thinking.dataset.msg
          } else if (event.status === 'done') {
            clearInterval(qaTimer)
            const elapsed = Math.round((Date.now() - qaStart) / 1000)
            const answerEl = document.createElement('div')
            answerEl.className = 'qa-answer'
            answerEl.textContent = event.answer
            pair.replaceChild(answerEl, thinking)
            // 所要時間を小さく表示
            const timeEl = document.createElement('div')
            timeEl.style.cssText = 'font-size:11px; color:var(--text-dim); padding:2px 4px; align-self:flex-start'
            timeEl.textContent = `${elapsed} 秒`
            pair.appendChild(timeEl)
            answerEl.scrollIntoView({ behavior: 'smooth' })
            fetchModelStatus()
          } else if (event.status === 'error') {
            clearInterval(qaTimer)
            thinking.textContent = '❌ エラー: ' + event.message
          }
        })
      } catch (e) {
        clearInterval(qaTimer)
        thinking.textContent = '❌ 接続エラー: ' + e.message
      }
      qaBtn.disabled = false
    }

    qaBtn.addEventListener('click', submitQuestion)
    qaInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.isComposing) submitQuestion()
    })
    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      const ph = document.getElementById('qaPlaceholder')
      document.getElementById('qaHistory').innerHTML = ''
      if (ph) document.getElementById('qaHistory').appendChild(ph)
      ph.style.display = qaInput.disabled ? 'flex' : 'none'
    })

    // ---------- モデル管理 ----------
    async function fetchModelStatus() {
      try {
        const res  = await fetch(`${API}/review/models`)
        if (!res.ok) return
        const info = await res.json()

        document.getElementById('modelList').innerHTML = info.available.map(m => `
          <label class="model-option">
            <input type="radio" name="vlModel" value="${m.id}"
                   ${m.id === info.current ? 'checked' : ''}>
            <span>${m.label}</span>
            <span class="model-meta">~${m.vram_gb} GB · ${m.note}</span>
          </label>
        `).join('')

        const dot  = document.getElementById('modelDot')
        const text = document.getElementById('modelStatusText')
        const unloadBtn = document.getElementById('unloadBtn')
        dot.classList.toggle('loaded', info.loaded)
        const label = info.available.find(m => m.id === info.current)?.label ?? info.current
        text.textContent = info.loaded ? `${label} ロード済み` : `${label} 未ロード`
        unloadBtn.style.display = info.loaded ? 'block' : 'none'

        document.querySelectorAll('input[name="vlModel"]').forEach(radio => {
          radio.addEventListener('change', async () => {
            await fetch(`${API}/review/models`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ model_id: radio.value }),
            })
            await fetchModelStatus()
          })
        })
      } catch {
        document.getElementById('modelStatusText').textContent = 'バックエンド未起動'
      }
    }

    document.getElementById('unloadBtn').addEventListener('click', async () => {
      await fetch(`${API}/review/unload`, { method: 'POST' })
      await fetchModelStatus()
    })

    fetchModelStatus()
  </script>
</body>
</html>
