<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Caption Player</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .header h1::before { content: '🎬 '; }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    /* ---------- ファイルドロップゾーン ---------- */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(74, 158, 255, 0.05);
    }
    .drop-zone .icon { font-size: 36px; margin-bottom: 8px; }
    .drop-zone .hint { color: var(--text-dim); font-size: 13px; margin-top: 4px; }

    /* ---------- 選択済みファイル ---------- */
    .file-info {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
      font-size: 13px;
    }
    .file-info.visible { display: flex; }
    .file-info .filename { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-info .change-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .file-info .change-btn:hover { color: var(--text); background: var(--border); }

    /* ---------- 言語セレクター ---------- */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lang-row label { color: var(--text-dim); font-size: 13px; white-space: nowrap; }
    .lang-row select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
    }

    /* ---------- セクション ---------- */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .result-row.done { color: var(--success); }
    .result-row.error { color: var(--error); }
    .result-path {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* ---------- Open Player ボタン ---------- */
    .open-player-wrap {
      display: none;
      padding-top: 8px;
    }
    .open-player-wrap.visible { display: block; }
    .btn-open-player {
      width: 100%;
      justify-content: center;
      font-size: 15px;
      padding: 13px;
    }

    /* ---------- 直接プレイヤーを開くボタン ---------- */
    .direct-player-wrap {
      padding-top: 4px;
    }
    .btn-direct-player {
      width: 100%;
      justify-content: center;
      font-size: 14px;
      padding: 10px;
    }

    /* ---------- モデル選択 ---------- */
    .model-columns {
      display: flex;
      gap: 16px;
    }
    .model-column {
      flex: 1;
      min-width: 0;
    }
    .model-group-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      margin: 0 0 4px;
      padding-left: 2px;
    }
    .model-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
    }
    .model-option:hover { background: var(--surface2); }
    .model-option input[type="radio"] { accent-color: var(--accent); cursor: pointer; }
    .model-meta { color: var(--text-dim); font-size: 12px; }
    .model-apply-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .model-status-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .status-dot.loaded { background: var(--success); }
  </style>
</head>
<body>
  <header class="header">
    <h1>Language Caption Player</h1>
  </header>

  <main class="main">
    <!-- ① 動画選択 -->
    <div>
      <div class="drop-zone" id="dropZone">
        <div class="icon">📂</div>
        <div>動画ファイルをドロップ、またはクリックして選択</div>
        <div class="hint">MP4 / MKV / AVI / MOV / WebM</div>
      </div>
      <div class="file-info" id="fileInfo">
        <span>🎬</span>
        <span class="filename" id="fileName"></span>
        <button class="change-btn" id="changeBtn">変更</button>
      </div>
    </div>

    <!-- ② 言語設定 -->
    <div class="lang-row">
      <label>音声言語：</label>
      <select id="langSelect">
        <option value="">自動検出</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="ja">日本語</option>
      </select>
    </div>

    <!-- ③ モデル設定 -->
    <div class="card">
      <div class="section-label">モデル設定</div>

      <div class="model-columns">
        <div class="model-column">
          <div class="model-group-label">翻訳モデル（バッチ・翻訳後に解放）</div>
          <div id="translatorModelList"></div>
        </div>
        <div class="model-column">
          <div class="model-group-label">辞書モデル（常駐・リアルタイム）</div>
          <div id="lookupModelList"></div>
        </div>
      </div>

      <div class="model-apply-row">
        <button class="btn btn-ghost" id="applyModelBtn" style="padding:5px 14px; font-size:13px">適用</button>
        <div class="model-status-group">
          <span class="status-dot" id="translatorDot"></span>
          <span id="translatorStatusText" style="color:var(--text-dim)">接続中...</span>
        </div>
        <div class="model-status-group" style="margin-left:8px">
          <span class="status-dot" id="lookupDot"></span>
          <span id="lookupStatusText" style="color:var(--text-dim)"></span>
        </div>
      </div>
    </div>

    <!-- ④ 文字起こし・日本語翻訳 -->
    <div style="display:flex; gap:16px">
      <div class="card" style="flex:1; min-width:0">
        <div class="section-label">① 文字起こし</div>
        <button class="btn btn-primary" id="transcribeBtn" disabled style="width:100%; justify-content:center">
          🎙️ 字幕を生成
        </button>
        <div class="progress-wrap" id="transcribeProgress" style="display:none">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="transcribeFill"></div></div>
          <div class="progress-label" id="transcribeLabel">準備中...</div>
        </div>
        <div class="result-row" id="transcribeResult"></div>
      </div>

      <div class="card" style="flex:1; min-width:0">
        <div class="section-label">② 日本語字幕を生成</div>
        <button class="btn btn-primary" id="translateBtn" disabled style="width:100%; justify-content:center">
          🇯🇵 日本語字幕を生成
        </button>
        <div class="progress-wrap" id="translateProgress" style="display:none">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="translateFill"></div></div>
          <div class="progress-label" id="translateLabel">準備中...</div>
        </div>
        <div class="result-row" id="translateResult"></div>
      </div>
    </div>

    <!-- ⑤ プレイヤーで開く -->
    <div class="open-player-wrap" id="openPlayerWrap">
      <button class="btn btn-success btn-open-player" id="openPlayerBtn">
        ▶ プレイヤーで開く
      </button>
    </div>

    <!-- ⑥ 字幕生成済みの動画を直接開く -->
    <div class="direct-player-wrap">
      <button class="btn btn-ghost btn-direct-player" id="directPlayerBtn">
        📂 字幕生成済みの動画をプレイヤーで開く
      </button>
    </div>

    <!-- ⑦ 動画レビュー -->
    <div class="direct-player-wrap">
      <button class="btn btn-ghost btn-direct-player" id="openReviewBtn">
        🔍 動画レビュー（内容調査・Q&amp;A）
      </button>
    </div>
  </main>

  <script>
    const API = 'http://127.0.0.1:8765'

    let videoPath = null
    let origSrtPath = null
    let jpSrtPath = null

    // ---------- 動画選択 ----------
    const dropZone  = document.getElementById('dropZone')
    const fileInfo  = document.getElementById('fileInfo')
    const fileName  = document.getElementById('fileName')
    const changeBtn = document.getElementById('changeBtn')

    async function selectVideo() {
      const p = await window.electronAPI.openVideo()
      if (p) await setVideo(p)
    }

    async function setVideo(p) {
      videoPath = p
      fileName.textContent = p.split(/[\\/]/).pop()
      dropZone.style.display = 'none'
      fileInfo.classList.add('visible')
      document.getElementById('transcribeBtn').disabled = false
      // リセット
      origSrtPath = jpSrtPath = null
      resetSection('transcribe')
      resetSection('translate')
      document.getElementById('openPlayerWrap').classList.remove('visible')

      // 既存の .original.srt があれば翻訳ボタンを自動で有効化
      const candidate = p.replace(/\.[^.]+$/, '') + '.original.srt'
      const check = await window.electronAPI.readFile(candidate)
      if (check.ok) {
        origSrtPath = candidate
        document.getElementById('translateBtn').disabled = false
        setResult('transcribe', true, candidate)
      }
    }

    dropZone.addEventListener('click', selectVideo)
    changeBtn.addEventListener('click', selectVideo)

    // ウィンドウ全体でデフォルトのファイルナビゲーションを抑制
    window.addEventListener('dragover', e => e.preventDefault())
    window.addEventListener('drop',     e => e.preventDefault())

    dropZone.addEventListener('dragover', e => {
      e.preventDefault(); dropZone.classList.add('drag-over')
    })
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'))
    dropZone.addEventListener('drop', async e => {
      e.preventDefault()
      dropZone.classList.remove('drag-over')
      const file = e.dataTransfer.files[0]
      if (file) await setVideo(window.electronAPI.getPathForFile(file))
    })

    // ---------- ヘルパー ----------
    function resetSection(kind) {
      document.getElementById(`${kind}Progress`).style.display = 'none'
      document.getElementById(`${kind}Fill`).style.width = '0%'
      document.getElementById(`${kind}Result`).innerHTML = ''
    }

    function setProgress(kind, pct, label) {
      document.getElementById(`${kind}Progress`).style.display = 'block'
      document.getElementById(`${kind}Fill`).style.width = pct + '%'
      document.getElementById(`${kind}Label`).textContent = label
    }

    function setResult(kind, ok, text) {
      const el = document.getElementById(`${kind}Result`)
      el.className = 'result-row ' + (ok ? 'done' : 'error')
      el.innerHTML = ok
        ? `<span>✓</span><span class="result-path" title="${text}">${text.split(/[\\/]/).pop()}</span>`
        : `<span>✗</span><span>${text}</span>`
    }

    // ---------- SSE ストリーム読み込み ----------
    async function readSSE(response, onEvent) {
      const reader = response.body.getReader()
      const decoder = new TextDecoder()
      let buf = ''
      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        buf += decoder.decode(value, { stream: true })
        const lines = buf.split('\n')
        buf = lines.pop()
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try { onEvent(JSON.parse(line.slice(6))) } catch {}
          }
        }
      }
    }

    // ---------- ① 文字起こし ----------
    document.getElementById('transcribeBtn').addEventListener('click', async () => {
      const btn = document.getElementById('transcribeBtn')
      btn.disabled = true
      resetSection('transcribe')
      setProgress('transcribe', 5, '準備中...')

      try {
        const lang = document.getElementById('langSelect').value || null
        const res = await fetch(`${API}/transcribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ video_path: videoPath, language: lang }),
        })
        await readSSE(res, event => {
          if (event.status === 'loading_model') {
            setProgress('transcribe', 10, 'ASR モデルをロード中（初回のみ時間がかかります）...')
          } else if (event.status === 'extracting_audio') {
            setProgress('transcribe', 30, '音声を抽出中...')
          } else if (event.status === 'saving_srt') {
            setProgress('transcribe', 80, `SRT を生成中 (${event.segments} セグメント)`)
          } else if (event.status === 'done') {
            setProgress('transcribe', 100, '完了')
            origSrtPath = event.srt_path
            setResult('transcribe', true, origSrtPath)
            document.getElementById('translateBtn').disabled = false
          } else if (event.status === 'error') {
            setResult('transcribe', false, event.message)
          }
        })
      } catch (e) {
        setResult('transcribe', false, `接続エラー: ${e.message}`)
      }
      btn.disabled = false
    })

    // ---------- ② 日本語翻訳 ----------
    document.getElementById('translateBtn').addEventListener('click', async () => {
      const btn = document.getElementById('translateBtn')
      btn.disabled = true
      resetSection('translate')
      setProgress('translate', 0, '準備中...')

      try {
        const res = await fetch(`${API}/translate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ srt_path: origSrtPath }),
        })
        await readSSE(res, event => {
          if (event.status === 'loading_model') {
            setProgress('translate', 2, '翻訳モデルをロード中（初回のみ時間がかかります）...')
          } else if (event.status === 'translating') {
            const pct = event.total > 0 ? Math.round(event.current / event.total * 100) : 0
            setProgress('translate', pct, `翻訳中 ${event.current} / ${event.total}`)
          } else if (event.status === 'done') {
            setProgress('translate', 100, '完了')
            jpSrtPath = event.srt_path
            setResult('translate', true, jpSrtPath)
            document.getElementById('openPlayerWrap').classList.add('visible')
          } else if (event.status === 'error') {
            setResult('translate', false, event.message)
          }
        })
      } catch (e) {
        setResult('translate', false, `接続エラー: ${e.message}`)
      }
      btn.disabled = false
    })

    // ---------- プレイヤーで開く ----------
    document.getElementById('openPlayerBtn').addEventListener('click', () => {
      window.electronAPI.openPlayer({
        videoPath,
        origSrt: origSrtPath,
        jpSrt:   jpSrtPath,
      })
    })

    // ---------- 字幕生成済みの動画を直接プレイヤーで開く ----------
    document.getElementById('directPlayerBtn').addEventListener('click', () => {
      window.electronAPI.openPlayer({})
    })

    // ---------- 動画レビューを開く ----------
    document.getElementById('openReviewBtn').addEventListener('click', () => {
      window.electronAPI.openReview()
    })

    // ---------- モデル管理 ----------
    function renderModelList(containerId, radioName, available, current) {
      document.getElementById(containerId).innerHTML = available.map(m => `
        <label class="model-option">
          <input type="radio" name="${radioName}" value="${m.id}"
                 ${m.id === current ? 'checked' : ''}>
          <span>${m.label}</span>
          <span class="model-meta">~${m.vram_gb} GB · ${m.note}</span>
        </label>
      `).join('')
    }

    function setModelStatus(dotId, textId, info, label) {
      const dot  = document.getElementById(dotId)
      const text = document.getElementById(textId)
      dot.classList.toggle('loaded', info.loaded)
      const modelLabel = info.available.find(m => m.id === info.current)?.label ?? info.current
      text.textContent = `${label}: ${info.loaded ? 'ロード済み' : '未ロード'}（${modelLabel}）`
    }

    async function fetchModels() {
      try {
        const res = await fetch(`${API}/models`)
        if (!res.ok) return
        const { translator: tInfo, lookup: lInfo } = await res.json()

        renderModelList('translatorModelList', 'translatorModel', tInfo.available, tInfo.current)
        renderModelList('lookupModelList',     'lookupModel',     lInfo.available, lInfo.current)

        setModelStatus('translatorDot', 'translatorStatusText', tInfo, '翻訳')
        setModelStatus('lookupDot',     'lookupStatusText',     lInfo, '辞書')
      } catch {
        document.getElementById('translatorStatusText').textContent = 'バックエンド未起動'
        document.getElementById('lookupStatusText').textContent = ''
      }
    }

    document.getElementById('applyModelBtn').addEventListener('click', async () => {
      const tSel = document.querySelector('input[name="translatorModel"]:checked')
      const lSel = document.querySelector('input[name="lookupModel"]:checked')
      const btn  = document.getElementById('applyModelBtn')
      btn.disabled = true
      try {
        const body = {}
        if (tSel) body.translator = tSel.value
        if (lSel) body.lookup     = lSel.value
        await fetch(`${API}/models`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        await fetchModels()
      } finally {
        btn.disabled = false
      }
    })

    fetchModels()
  </script>
</body>
</html>
